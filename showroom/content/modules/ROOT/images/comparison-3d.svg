<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Red Hat Display,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="g3s" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#EE0000"/><stop offset="100%" stop-color="#AA0000"/></linearGradient>
    <linearGradient id="g3r" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#CC0000"/><stop offset="100%" stop-color="#990000"/></linearGradient>
    <linearGradient id="g3t" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#FF3333"/><stop offset="100%" stop-color="#EE0000"/></linearGradient>
    <linearGradient id="gcl" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0066CC"/><stop offset="100%" stop-color="#004499"/></linearGradient>
    <linearGradient id="gcr" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#0055AA"/><stop offset="100%" stop-color="#003377"/></linearGradient>
    <linearGradient id="gct" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#3399FF"/><stop offset="100%" stop-color="#0066CC"/></linearGradient>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f8f9fa"/><stop offset="100%" stop-color="#e9ecef"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.15"/></filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" rx="12" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="20" font-weight="700" fill="#151515">Resource Comparison: 3scale vs Connectivity Link</text>
  <text x="450" y="58" text-anchor="middle" font-size="12" fill="#6a6e73">Number of Kubernetes CRDs / resources per capability</text>

  <!-- Legend -->
  <rect x="300" y="70" width="16" height="16" rx="3" fill="#EE0000"/>
  <text x="322" y="83" font-size="12" fill="#333" font-weight="600">3scale</text>
  <rect x="400" y="70" width="16" height="16" rx="3" fill="#0066CC"/>
  <text x="422" y="83" font-size="12" fill="#333" font-weight="600">Connectivity Link</text>
  <rect x="540" y="70" width="16" height="16" rx="3" fill="#28a745" opacity="0.8"/>
  <text x="562" y="83" font-size="12" fill="#333" font-weight="600">Fewer = Better</text>

  <!-- Grid floor (isometric) -->
  <g opacity="0.12">
    <line x1="80" y1="460" x2="820" y2="460" stroke="#333" stroke-width="1"/>
    <line x1="80" y1="400" x2="820" y2="400" stroke="#333" stroke-width="0.5" stroke-dasharray="4,4"/>
    <line x1="80" y1="340" x2="820" y2="340" stroke="#333" stroke-width="0.5" stroke-dasharray="4,4"/>
    <line x1="80" y1="280" x2="820" y2="280" stroke="#333" stroke-width="0.5" stroke-dasharray="4,4"/>
    <line x1="80" y1="220" x2="820" y2="220" stroke="#333" stroke-width="0.5" stroke-dasharray="4,4"/>
    <line x1="80" y1="160" x2="820" y2="160" stroke="#333" stroke-width="0.5" stroke-dasharray="4,4"/>
  </g>

  <!-- Y-axis labels -->
  <text x="72" y="464" text-anchor="end" font-size="11" fill="#6a6e73">0</text>
  <text x="72" y="404" text-anchor="end" font-size="11" fill="#6a6e73">1</text>
  <text x="72" y="344" text-anchor="end" font-size="11" fill="#6a6e73">2</text>
  <text x="72" y="284" text-anchor="end" font-size="11" fill="#6a6e73">3</text>
  <text x="72" y="224" text-anchor="end" font-size="11" fill="#6a6e73">4</text>
  <text x="72" y="164" text-anchor="end" font-size="11" fill="#6a6e73">5</text>
  <text x="40" y="310" text-anchor="middle" font-size="11" fill="#6a6e73" transform="rotate(-90,40,310)">Resources</text>

  <!-- ============ Category 1: API Gateway ============ -->
  <!-- 3scale: 3 (Product + Backend + APIcast) -->
  <g filter="url(#shadow)">
    <!-- Front face -->
    <rect x="100" y="280" width="40" height="180" rx="0" fill="url(#g3s)"/>
    <!-- Top face (3D) -->
    <polygon points="100,280 115,268 155,268 140,280" fill="url(#g3t)"/>
    <!-- Right face (3D) -->
    <polygon points="140,280 155,268 155,448 140,460" fill="url(#g3r)"/>
  </g>
  <!-- CL: 1 (Gateway) -->
  <g filter="url(#shadow)">
    <rect x="148" y="400" width="40" height="60" rx="0" fill="url(#gcl)"/>
    <polygon points="148,400 163,388 203,388 188,400" fill="url(#gct)"/>
    <polygon points="188,400 203,388 203,448 188,460" fill="url(#gcr)"/>
  </g>
  <text x="150" y="485" text-anchor="middle" font-size="11" fill="#333" font-weight="600">API</text>
  <text x="150" y="498" text-anchor="middle" font-size="11" fill="#333" font-weight="600">Gateway</text>
  <!-- Value labels -->
  <text x="120" y="274" text-anchor="middle" font-size="13" fill="#EE0000" font-weight="700">3</text>
  <text x="168" y="394" text-anchor="middle" font-size="13" fill="#0066CC" font-weight="700">1</text>

  <!-- ============ Category 2: Routing ============ -->
  <!-- 3scale: 2 (MappingRules inside Backend + Product backendUsages) -->
  <g filter="url(#shadow)">
    <rect x="230" y="340" width="40" height="120" rx="0" fill="url(#g3s)"/>
    <polygon points="230,340 245,328 285,328 270,340" fill="url(#g3t)"/>
    <polygon points="270,340 285,328 285,448 270,460" fill="url(#g3r)"/>
  </g>
  <!-- CL: 1 (HTTPRoute) -->
  <g filter="url(#shadow)">
    <rect x="278" y="400" width="40" height="60" rx="0" fill="url(#gcl)"/>
    <polygon points="278,400 293,388 333,388 318,400" fill="url(#gct)"/>
    <polygon points="318,400 333,388 333,448 318,460" fill="url(#gcr)"/>
  </g>
  <text x="280" y="485" text-anchor="middle" font-size="11" fill="#333" font-weight="600">Routing</text>
  <text x="250" y="334" text-anchor="middle" font-size="13" fill="#EE0000" font-weight="700">2</text>
  <text x="298" y="394" text-anchor="middle" font-size="13" fill="#0066CC" font-weight="700">1</text>

  <!-- ============ Category 3: Authentication ============ -->
  <!-- 3scale: 2 (Product OIDC/userkey config + Application) -->
  <g filter="url(#shadow)">
    <rect x="360" y="340" width="40" height="120" rx="0" fill="url(#g3s)"/>
    <polygon points="360,340 375,328 415,328 400,340" fill="url(#g3t)"/>
    <polygon points="400,340 415,328 415,448 400,460" fill="url(#g3r)"/>
  </g>
  <!-- CL: 1 (AuthPolicy or OIDCPolicy) -->
  <g filter="url(#shadow)">
    <rect x="408" y="400" width="40" height="60" rx="0" fill="url(#gcl)"/>
    <polygon points="408,400 423,388 463,388 448,400" fill="url(#gct)"/>
    <polygon points="448,400 463,388 463,448 448,460" fill="url(#gcr)"/>
  </g>
  <text x="410" y="485" text-anchor="middle" font-size="11" fill="#333" font-weight="600">Auth</text>
  <text x="380" y="334" text-anchor="middle" font-size="13" fill="#EE0000" font-weight="700">2</text>
  <text x="428" y="394" text-anchor="middle" font-size="13" fill="#0066CC" font-weight="700">1</text>

  <!-- ============ Category 4: Rate Limiting ============ -->
  <!-- 3scale: 1 (Application Plan inside Product) -->
  <g filter="url(#shadow)">
    <rect x="490" y="400" width="40" height="60" rx="0" fill="url(#g3s)"/>
    <polygon points="490,400 505,388 545,388 530,400" fill="url(#g3t)"/>
    <polygon points="530,400 545,388 545,448 530,460" fill="url(#g3r)"/>
  </g>
  <!-- CL: 2 (RateLimitPolicy + PlanPolicy) -->
  <g filter="url(#shadow)">
    <rect x="538" y="340" width="40" height="120" rx="0" fill="url(#gcl)"/>
    <polygon points="538,340 553,328 593,328 578,340" fill="url(#gct)"/>
    <polygon points="578,340 593,328 593,448 578,460" fill="url(#gcr)"/>
  </g>
  <text x="540" y="485" text-anchor="middle" font-size="11" fill="#333" font-weight="600">Rate</text>
  <text x="540" y="498" text-anchor="middle" font-size="11" fill="#333" font-weight="600">Limiting</text>
  <text x="510" y="394" text-anchor="middle" font-size="13" fill="#EE0000" font-weight="700">1</text>
  <text x="558" y="334" text-anchor="middle" font-size="13" fill="#0066CC" font-weight="700">2</text>

  <!-- ============ Category 5: Dev Portal ============ -->
  <!-- 3scale: 2 (Developer Portal + ActiveDoc) -->
  <g filter="url(#shadow)">
    <rect x="620" y="340" width="40" height="120" rx="0" fill="url(#g3s)"/>
    <polygon points="620,340 635,328 675,328 660,340" fill="url(#g3t)"/>
    <polygon points="660,340 675,328 675,448 660,460" fill="url(#g3r)"/>
  </g>
  <!-- CL: 1 (APIProduct) -->
  <g filter="url(#shadow)">
    <rect x="668" y="400" width="40" height="60" rx="0" fill="url(#gcl)"/>
    <polygon points="668,400 683,388 723,388 708,400" fill="url(#gct)"/>
    <polygon points="708,400 723,388 723,448 708,460" fill="url(#gcr)"/>
  </g>
  <text x="670" y="485" text-anchor="middle" font-size="11" fill="#333" font-weight="600">Dev</text>
  <text x="670" y="498" text-anchor="middle" font-size="11" fill="#333" font-weight="600">Portal</text>
  <text x="640" y="334" text-anchor="middle" font-size="13" fill="#EE0000" font-weight="700">2</text>
  <text x="688" y="394" text-anchor="middle" font-size="13" fill="#0066CC" font-weight="700">1</text>

  <!-- ============ Category 6: GitOps ============ -->
  <!-- 3scale: 4 (Product CRD + Backend CRD + ActiveDoc CRD + 3scale Operator) -->
  <g filter="url(#shadow)">
    <rect x="750" y="220" width="40" height="240" rx="0" fill="url(#g3s)"/>
    <polygon points="750,220 765,208 805,208 790,220" fill="url(#g3t)"/>
    <polygon points="790,220 805,208 805,448 790,460" fill="url(#g3r)"/>
  </g>
  <!-- CL: 1 (all CRDs in Git, ArgoCD syncs) -->
  <g filter="url(#shadow)">
    <rect x="798" y="400" width="40" height="60" rx="0" fill="url(#gcl)"/>
    <polygon points="798,400 813,388 853,388 838,400" fill="url(#gct)"/>
    <polygon points="838,400 853,388 853,448 838,460" fill="url(#gcr)"/>
  </g>
  <text x="800" y="485" text-anchor="middle" font-size="11" fill="#333" font-weight="600">GitOps</text>
  <text x="800" y="498" text-anchor="middle" font-size="11" fill="#333" font-weight="600">Config</text>
  <text x="770" y="214" text-anchor="middle" font-size="13" fill="#EE0000" font-weight="700">4</text>
  <text x="818" y="394" text-anchor="middle" font-size="13" fill="#0066CC" font-weight="700">1</text>

  <!-- Totals bar at bottom -->
  <rect x="100" y="505" width="740" height="1" fill="#d2d2d2"/>
  <text x="350" y="518" text-anchor="middle" font-size="12" fill="#EE0000" font-weight="700">3scale Total: 14 resources across 2 namespaces</text>
  <text x="650" y="518" text-anchor="middle" font-size="12" fill="#0066CC" font-weight="700">CL Total: 7 resources in 1 namespace (GitOps)</text>
</svg>
