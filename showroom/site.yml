site:
  title: "From 3scale to Connectivity Link"
  url: https://maximilianopizarro.github.io/from-3scale-to-connectivity-link
  start_page: modules::index.adoc
content:
  sources:
    # RHDP showroom runs Antora inside `/showroom/repo`; local paths like `url: .` or `url: ..`
    # break the init container (not a git root / escapes the clone). Remote URL matches HEAD after push.
    # Local previews without pushing: run Antora from repo root with inline playbook override or push to a branch.
    - url: https://github.com/maximilianoPizarro/from-3scale-to-connectivity-link.git
      branches: HEAD
      start_path: showroom/content
ui:
  bundle:
    url: https://github.com/rhpds/rhdp_showroom_theme/releases/download/patternfly-6/ui-bundle.zip
    snapshot: true
  supplemental_files: ./content/supplemental-ui
asciidoc:
  attributes:
    # Root-relative so diagrams load on OpenShift showroom regardless of nookbag URL shell.
    # GitHub Actions patches this line before build to /<repo>/modules/_images for Pages project sites.
    imagesdir: /modules/_images
output:
  dir: ./www
