name: Deploy Showroom to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Antora
        run: npm i -g @antora/cli@3.1 @antora/site-generator@3.1

      - name: Build Antora site
        run: antora --stacktrace site.yml
        working-directory: showroom

      - name: Replace Demo Platform branding with Kuadrant
        run: |
          cp docs/assets/images/kuadrant-logo.svg showroom/www/_/img/footer_logo.svg

          python3 << 'PYEOF'
          import glob, re

          NEW_FOOTER = '''<footer class="footer" style="text-align:center;padding:20px;">
            <a href="https://kuadrant.io/" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:10px;text-decoration:none;color:#666;">
              <img src="{root}_/img/footer_logo.svg" alt="Kuadrant" style="height:40px;">
              <span style="font-size:0.85rem;line-height:1.3;"><strong>From 3scale to Connectivity Link</strong><br>Powered by Kuadrant</span>
            </a>
          </footer>'''

          for fpath in glob.glob('showroom/www/**/*.html', recursive=True):
              with open(fpath) as f:
                  html = f.read()

              depth = fpath.replace('showroom/www/', '').count('/')
              root = '../' * depth if depth > 0 else ''
              footer = NEW_FOOTER.replace('{root}', root)

              html = re.sub(
                  r'<footer class="footer">.*?</footer>',
                  footer,
                  html,
                  flags=re.DOTALL
              )
              with open(fpath, 'w') as f:
                  f.write(html)

          print('Footer replaced in all HTML files')
          PYEOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: showroom/www

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
