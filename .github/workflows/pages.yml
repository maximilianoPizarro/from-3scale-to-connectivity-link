name: Deploy Showroom to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Antora
        run: npm i -g @antora/cli@3.1 @antora/site-generator@3.1

      - name: Build Antora site
        working-directory: showroom
        env:
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          sed -i.bak "s|^    imagesdir: /modules/_images|    imagesdir: /${REPO_NAME}/modules/_images|" site.yml
          antora --stacktrace site.yml

      - name: Publish nookbag config at site root (zero-touch-config.yml)
        run: |
          cp ui-config.yml showroom/www/zero-touch-config.yml
          cp ui-config.yml showroom/www/ui-config.yml

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: showroom/www

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
