---
type: showroom

default_width: 30
persist_url_state: true

view_switcher:
  enabled: true
  default_mode: split

tabs:
  # Backstage OIDC often fails inside an iframe (redirect chain / Keycloak framing). Open from Workshop links if needed.
  # RHDP nookbag substitutes ${DOMAIN} from the content container DOMAIN env (apps subdomain), not AsciiDoc-style {cluster_domain}.
  - name: Developer Hub
    url: 'https://backstage-developer-hub-developer-hub.${DOMAIN}'

  # RHDP nookbag: path+port loads the in-cluster terminal (same pattern as openshift-days-ops-showroom).
  # Our nginx maps /terminal/ -> tty. Do not use #terminal — it breaks navigation.
  - name: Terminal
    path: /terminal/
    port: 443
