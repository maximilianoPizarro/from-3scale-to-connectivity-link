---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: nfl-wallet-api
  namespace: default
  description: "NFL Wallet REST API — Customer Service endpoints protegidos con API Key (header X-API-Key)"
  annotations:
    kuadrant.io/namespace: nfl-wallet-prod
    kuadrant.io/apiproduct: nfl-wallet-api
    kuadrant.io/httproute: nfl-wallet-api-route
  tags:
    - rest
    - openapi
    - api-key
    - kuadrant
spec:
  type: openapi
  lifecycle: production
  owner: platform-engineering
  system: nfl-wallet-system
  definition: |
    openapi: "3.0.3"
    info:
      title: NFL Wallet — Customer Service API
      description: |
        API REST de gestión de clientes para NFL Wallet.
        Protegida por Kuadrant AuthPolicy con autenticación API Key (header X-API-Key).
        Incluye RateLimitPolicy de 120 req/min.

        **API Keys disponibles:**
        - `nfl-wallet-demo-key-2024` (admin — lectura y escritura)
        - `nfl-wallet-readonly-key-2024` (readonly — solo lectura)
      version: "1.0.0"
      contact:
        name: Platform Engineering
        email: platform@neuralbank.dev
    servers:
      - url: https://nfl-wallet.apps.cluster-cq9fp.dynamic.redhatworkshops.io
        description: Producción (nfl-wallet-prod)
    security:
      - ApiKeyAuth: []
    tags:
      - name: Customer Service
        description: Operaciones CRUD de clientes
      - name: Credit Scoring
        description: Gestión de score crediticio
      - name: Customer Status
        description: Activación, desactivación y bloqueo de clientes
    paths:
      /api/v1/customers:
        get:
          summary: Listar clientes con filtros
          tags: [Customer Service]
          parameters:
            - name: search
              in: query
              schema:
                type: string
            - name: tipoCliente
              in: query
              schema:
                type: string
                enum: [PERSONAL, EMPRESARIAL, CORPORATIVO]
            - name: activo
              in: query
              schema:
                type: boolean
            - name: ciudad
              in: query
              schema:
                type: string
            - name: nivelRiesgo
              in: query
              schema:
                type: string
            - name: page
              in: query
              schema:
                type: integer
                default: 0
            - name: size
              in: query
              schema:
                type: integer
                default: 20
          responses:
            '200':
              description: Lista paginada de clientes
            '401':
              description: API key inválida o faltante
        post:
          summary: Crear nuevo cliente
          tags: [Customer Service]
          requestBody:
            required: true
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/CreateCustomerRequest'
          responses:
            '201':
              description: Cliente creado exitosamente
            '400':
              description: Datos inválidos
            '409':
              description: Cliente duplicado
      /api/v1/customers/{customerId}:
        get:
          summary: Obtener cliente por ID
          tags: [Customer Service]
          parameters:
            - name: customerId
              in: path
              required: true
              schema:
                type: integer
                format: int64
          responses:
            '200':
              description: Cliente encontrado
            '404':
              description: Cliente no encontrado
        put:
          summary: Actualizar cliente
          tags: [Customer Service]
          parameters:
            - name: customerId
              in: path
              required: true
              schema:
                type: integer
                format: int64
          requestBody:
            required: true
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/UpdateCustomerRequest'
          responses:
            '200':
              description: Cliente actualizado
            '404':
              description: Cliente no encontrado
        delete:
          summary: Eliminar cliente (soft delete)
          tags: [Customer Service]
          parameters:
            - name: customerId
              in: path
              required: true
              schema:
                type: integer
                format: int64
          responses:
            '204':
              description: Cliente eliminado
            '404':
              description: Cliente no encontrado
      /api/v1/customers/{customerId}/credit-score:
        get:
          summary: Obtener score crediticio
          tags: [Credit Scoring]
          parameters:
            - name: customerId
              in: path
              required: true
              schema:
                type: integer
                format: int64
          responses:
            '200':
              description: Score obtenido
            '404':
              description: Cliente no encontrado
      /api/v1/customers/{customerId}/credit-score/calculate:
        post:
          summary: Recalcular score crediticio
          tags: [Credit Scoring]
          parameters:
            - name: customerId
              in: path
              required: true
              schema:
                type: integer
                format: int64
          responses:
            '200':
              description: Score calculado
            '404':
              description: Cliente no encontrado
      /api/v1/customers/{customerId}/activate:
        post:
          summary: Activar cliente
          tags: [Customer Status]
          parameters:
            - name: customerId
              in: path
              required: true
              schema:
                type: integer
                format: int64
          responses:
            '204':
              description: Cliente activado
            '404':
              description: Cliente no encontrado
      /api/v1/customers/{customerId}/deactivate:
        post:
          summary: Desactivar cliente
          tags: [Customer Status]
          parameters:
            - name: customerId
              in: path
              required: true
              schema:
                type: integer
                format: int64
          responses:
            '204':
              description: Cliente desactivado
            '404':
              description: Cliente no encontrado
      /api/v1/customers/{customerId}/block:
        post:
          summary: Bloquear cliente
          tags: [Customer Status]
          parameters:
            - name: customerId
              in: path
              required: true
              schema:
                type: integer
                format: int64
          responses:
            '204':
              description: Cliente bloqueado
            '404':
              description: Cliente no encontrado
      /api/v1/customers/{customerId}/summary:
        get:
          summary: Resumen completo del cliente
          tags: [Customer Service]
          parameters:
            - name: customerId
              in: path
              required: true
              schema:
                type: integer
                format: int64
          responses:
            '200':
              description: Resumen obtenido
            '404':
              description: Cliente no encontrado
    components:
      securitySchemes:
        ApiKeyAuth:
          type: apiKey
          in: header
          name: X-API-Key
          description: |
            API Key para autenticación. Enviar en header X-API-Key.
            Keys disponibles: nfl-wallet-demo-key-2024 (admin), nfl-wallet-readonly-key-2024 (readonly)
      schemas:
        CreateCustomerRequest:
          type: object
          required: [identificacion, tipoIdentificacion, nombre, apellido]
          properties:
            identificacion:
              type: string
            tipoIdentificacion:
              type: string
              enum: [DNI, PASSPORT, SSN, RFC, CURP, CPF, CUIT, RUT, RUN, NINO, CIF, EIN, TAX_ID]
            nombre:
              type: string
            apellido:
              type: string
            fechaNacimiento:
              type: string
              format: date
            email:
              type: string
            telefono:
              type: string
            direccion:
              type: string
            ciudad:
              type: string
            tipoCliente:
              type: string
              enum: [PERSONAL, EMPRESARIAL, CORPORATIVO]
        UpdateCustomerRequest:
          type: object
          properties:
            nombre:
              type: string
            apellido:
              type: string
            email:
              type: string
            telefono:
              type: string
            direccion:
              type: string
            ciudad:
              type: string
