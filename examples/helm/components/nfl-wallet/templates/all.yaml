apiVersion: v1
kind: Namespace
metadata:
  name: nfl-wallet-prod
  labels:
    istio.io/dataplane-mode: ambient
---
apiVersion: v1
kind: Namespace
metadata:
  name: nfl-wallet-test
  labels:
    istio.io/dataplane-mode: ambient
---
apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  name: nfl-wallet-api
  namespace: nfl-wallet-prod
  labels:
    app: nfl-wallet-api
    app.kubernetes.io/name: nfl-wallet-api
    backstage.io/kubernetes-id: nfl-wallet
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nfl-wallet-api
  template:
    metadata:
      labels:
        app: nfl-wallet-api
        app.kubernetes.io/name: nfl-wallet-api
    spec:
      containers:
      - name: nfl-wallet-api
        image: quay.io/maximilianopizarro/neuralbank-backend:latest
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: QUARKUS_DATASOURCE_JDBC_URL
          value: "jdbc:postgresql://nfl-wallet-db:5432/nflwallet"
        - name: QUARKUS_DATASOURCE_USERNAME
          value: "nflwallet"
        - name: QUARKUS_DATASOURCE_PASSWORD
          value: "nflwallet123!"
        resources:
          limits:
            cpu: "500m"
            memory: 512Mi
          requests:
            cpu: "100m"
            memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  name: nfl-wallet-api
  namespace: nfl-wallet-prod
  labels:
    app: nfl-wallet-api
    backstage.io/kubernetes-id: nfl-wallet
spec:
  selector:
    app: nfl-wallet-api
  ports:
  - port: 8080
    targetPort: 8080
    name: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  name: nfl-wallet-db
  namespace: nfl-wallet-prod
  labels:
    app: nfl-wallet-db
    backstage.io/kubernetes-id: nfl-wallet
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nfl-wallet-db
  template:
    metadata:
      labels:
        app: nfl-wallet-db
    spec:
      containers:
      - name: postgresql
        image: registry.redhat.io/rhel9/postgresql-15:latest
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRESQL_USER
          value: "nflwallet"
        - name: POSTGRESQL_PASSWORD
          value: "nflwallet123!"
        - name: POSTGRESQL_DATABASE
          value: "nflwallet"
        resources:
          limits:
            cpu: "500m"
            memory: 512Mi
          requests:
            cpu: "100m"
            memory: 256Mi
        volumeMounts:
        - name: db-data
          mountPath: /var/lib/pgsql/data
      volumes:
      - name: db-data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  name: nfl-wallet-db
  namespace: nfl-wallet-prod
  labels:
    app: nfl-wallet-db
    backstage.io/kubernetes-id: nfl-wallet
spec:
  selector:
    app: nfl-wallet-db
  ports:
  - port: 5432
    targetPort: 5432
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  name: nfl-wallet-route
  namespace: nfl-wallet-prod
  labels:
    backstage.io/kubernetes-id: nfl-wallet
spec:
  host: nfl-wallet.{{ .Values.clusterDomain }}
  port:
    targetPort: 8080
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  to:
    kind: Service
    name: nfl-wallet-api
    weight: 100
