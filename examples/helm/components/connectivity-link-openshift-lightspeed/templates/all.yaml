##
## 2. Granite CPU Model — Ollama serving granite3.1:8b
##
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: granite-cpu-models
  namespace: openshift-lightspeed
  labels:
    app.kubernetes.io/part-of: connectivity-link-lightspeed
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: Secret
metadata:
  name: granite-cpu-credentials
  namespace: openshift-lightspeed
  labels:
    app.kubernetes.io/part-of: connectivity-link-lightspeed
  annotations:
    argocd.argoproj.io/sync-wave: "1"
type: Opaque
stringData:
  apitoken: "no-key-needed"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: granite-cpu
  namespace: openshift-lightspeed
  labels:
    app: granite-cpu
    app.kubernetes.io/part-of: connectivity-link-lightspeed
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: granite-cpu
  template:
    metadata:
      labels:
        app: granite-cpu
        app.kubernetes.io/part-of: connectivity-link-lightspeed
    spec:
      containers:
        - name: ollama
          image: docker.io/ollama/ollama:latest
          env:
            - name: OLLAMA_MODELS
              value: /models
            - name: OLLAMA_HOST
              value: "0.0.0.0:11434"
            - name: HOME
              value: /tmp
          command: ["/bin/sh", "-c"]
          args:
            - |
              ollama serve &
              SERVER_PID=$!
              echo "Waiting for Ollama server..."
              until curl -sf http://localhost:11434/api/tags >/dev/null 2>&1; do sleep 2; done
              echo "Server ready, pulling granite3.1:8b..."
              ollama pull granite3.1:8b
              echo "Model granite3.1:8b ready for inference"
              wait $SERVER_PID
          ports:
            - name: http
              containerPort: 11434
              protocol: TCP
          resources:
            requests:
              cpu: "2"
              memory: "8Gi"
            limits:
              cpu: "4"
              memory: "12Gi"
          volumeMounts:
            - name: models
              mountPath: /models
          startupProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            periodSeconds: 30
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "curl -sf http://localhost:11434/api/tags | grep -q granite"
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 20
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: granite-cpu-models
---
apiVersion: v1
kind: Service
metadata:
  name: granite-cpu
  namespace: openshift-lightspeed
  labels:
    app: granite-cpu
    app.kubernetes.io/part-of: connectivity-link-lightspeed
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  selector:
    app: granite-cpu
  ports:
    - name: http
      port: 11434
      targetPort: 11434
      protocol: TCP
---
##
## 3. OLSConfig — Granite CPU + MCP servers for tool calling
##
apiVersion: ols.openshift.io/v1alpha1
kind: OLSConfig
metadata:
  name: cluster
  labels:
    app.kubernetes.io/part-of: connectivity-link-lightspeed
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  featureGates:
    - MCPServer
  llm:
    providers:
      - name: granite-cpu
        type: openai
        url: "http://granite-cpu.openshift-lightspeed.svc.cluster.local:11434/v1"
        credentialsSecretRef:
          name: granite-cpu-credentials
        models:
          - name: granite3.1:8b
      - name: litellm
        type: openai
        url: "https://litellm-prod.apps.maas.redhatworkshops.io/v1"
        credentialsSecretRef:
          name: llm-credentials
        models:
          - name: llama-scout-17b
  ols:
    defaultProvider: granite-cpu
    defaultModel: granite3.1:8b
    logLevel: INFO
    querySystemPrompt: |
      CRITICAL RULE: You have tool functions available. When the user asks about
      ANY cluster resource or operation, you MUST call the appropriate tool.
      DO NOT suggest CLI commands from the documentation below.

      For READING resources: use pods_list, resources_list, resources_get,
      pods_log, pods_top, nodes_top, projects_list.
      For CREATING/UPDATING resources: use resources_create_or_update with
      a valid YAML definition of the Kubernetes resource.
      For DELETING resources: use resources_delete.
      For SCALING: use resources_scale.

      ALWAYS prefer these tools over documentation. Never say the request
      is incomplete when you have tools that can answer it.
    deployment:
      api:
        replicas: 1
      console:
        replicas: 1
      dataCollector: {}
      database:
        replicas: 1
      llamaStack: {}
      mcpServer: {}
    mcpServers:
      - name: openshift-mcp-server
        url: "http://field-content-ols.openshift-lightspeed.svc.cluster.local:8080/mcp"
        timeout: 120
      - name: kubernetes-mcp-server
        url: "http://field-content-ols-k8s-mcp.openshift-lightspeed.svc.cluster.local:8085/mcp"
        timeout: 120
    conversationCache:
      type: postgres
      postgres:
        maxConnections: 2000
        sharedBuffers: 256MB
    introspectionEnabled: true
    userDataCollection: {}
