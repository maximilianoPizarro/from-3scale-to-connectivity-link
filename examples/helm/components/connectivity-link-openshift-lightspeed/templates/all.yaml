##
## 2. Granite CPU Model — Ollama serving granite3.1:8b
##
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: granite-cpu-models
  namespace: openshift-lightspeed
  labels:
    app.kubernetes.io/part-of: connectivity-link-lightspeed
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: Secret
metadata:
  name: granite-cpu-credentials
  namespace: openshift-lightspeed
  labels:
    app.kubernetes.io/part-of: connectivity-link-lightspeed
  annotations:
    argocd.argoproj.io/sync-wave: "1"
type: Opaque
stringData:
  apitoken: "no-key-needed"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: granite-cpu
  namespace: openshift-lightspeed
  labels:
    app: granite-cpu
    app.kubernetes.io/part-of: connectivity-link-lightspeed
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: granite-cpu
  template:
    metadata:
      labels:
        app: granite-cpu
        app.kubernetes.io/part-of: connectivity-link-lightspeed
    spec:
      initContainers:
        - name: download-model
          image: curlimages/curl:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              if [ -f /models/granite.gguf ]; then
                echo "Model already exists on PVC, skipping download"
                ls -lh /models/granite.gguf
              else
                echo "Downloading Granite 3.1 8B Instruct Q4_K_M (~5GB)..."
                curl -L --progress-bar -o /models/granite.gguf \
                  "https://huggingface.co/bartowski/granite-3.1-8b-instruct-GGUF/resolve/main/granite-3.1-8b-instruct-Q4_K_M.gguf"
                echo "Download complete"
                ls -lh /models/granite.gguf
              fi
          volumeMounts:
            - name: models
              mountPath: /models
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      containers:
        - name: llama-cpp
          image: ghcr.io/ggerganov/llama.cpp:server
          args:
            - "--model"
            - "/models/granite.gguf"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8080"
            - "--ctx-size"
            - "4096"
            - "--threads"
            - "4"
            - "--n-predict"
            - "2048"
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          resources:
            requests:
              cpu: "2"
              memory: "8Gi"
            limits:
              cpu: "4"
              memory: "12Gi"
          volumeMounts:
            - name: models
              mountPath: /models
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 60
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: granite-cpu-models
---
apiVersion: v1
kind: Service
metadata:
  name: granite-cpu
  namespace: openshift-lightspeed
  labels:
    app: granite-cpu
    app.kubernetes.io/part-of: connectivity-link-lightspeed
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  selector:
    app: granite-cpu
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
---
##
## 3. OLSConfig — Granite CPU + MCP servers for tool calling
##
apiVersion: ols.openshift.io/v1alpha1
kind: OLSConfig
metadata:
  name: cluster
  labels:
    app.kubernetes.io/part-of: connectivity-link-lightspeed
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  featureGates:
    - MCPServer
  llm:
    providers:
      - name: granite-cpu
        type: openai
        url: "http://granite-cpu.openshift-lightspeed.svc.cluster.local:8080/v1"
        credentialsSecretRef:
          name: granite-cpu-credentials
        models:
          - name: granite3.1:8b
      - name: litellm
        type: openai
        url: "https://litellm-prod.apps.maas.redhatworkshops.io/v1"
        credentialsSecretRef:
          name: llm-credentials
        models:
          - name: llama-scout-17b
  ols:
    defaultProvider: granite-cpu
    defaultModel: granite3.1:8b
    logLevel: INFO
    querySystemPrompt: |
      CRITICAL RULE: You have tool functions available. When the user asks about
      ANY cluster resource or operation, you MUST call the appropriate tool.
      DO NOT suggest CLI commands from the documentation below.

      For READING resources: use pods_list, resources_list, resources_get,
      pods_log, pods_top, nodes_top, projects_list.
      For CREATING/UPDATING resources: use resources_create_or_update with
      a valid YAML definition of the Kubernetes resource.
      For DELETING resources: use resources_delete.
      For SCALING: use resources_scale.

      ALWAYS prefer these tools over documentation. Never say the request
      is incomplete when you have tools that can answer it.
    deployment:
      api:
        replicas: 1
      console:
        replicas: 1
      dataCollector: {}
      database:
        replicas: 1
      llamaStack: {}
      mcpServer: {}
    mcpServers:
      - name: openshift-mcp-server
        url: "http://field-content-ols.openshift-lightspeed.svc.cluster.local:8080/mcp"
        timeout: 120
      - name: kubernetes-mcp-server
        url: "http://field-content-ols-k8s-mcp.openshift-lightspeed.svc.cluster.local:8085/mcp"
        timeout: 120
    conversationCache:
      type: postgres
      postgres:
        maxConnections: 2000
        sharedBuffers: 256MB
    introspectionEnabled: true
    userDataCollection: {}
