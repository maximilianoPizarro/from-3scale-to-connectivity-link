##
## 1. LLM Credentials Secret (for OLS → LiteLLM endpoint)
##    apitoken is injected via Helm values (NOT hardcoded in git)
##
apiVersion: v1
kind: Secret
metadata:
  name: llm-credentials
  namespace: openshift-lightspeed
  labels:
    app.kubernetes.io/part-of: connectivity-link-lightspeed
  annotations:
    argocd.argoproj.io/sync-wave: "1"
type: Opaque
stringData:
  apitoken: {{ .Values.llmApiKey | default "" | quote }}
---
##
## 2. OLSConfig — LiteLLM + MCP servers for tool calling
##
apiVersion: ols.openshift.io/v1alpha1
kind: OLSConfig
metadata:
  name: cluster
  labels:
    app.kubernetes.io/part-of: connectivity-link-lightspeed
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  featureGates:
    - MCPServer
  llm:
    providers:
      - name: litellm
        type: openai
        url: {{ .Values.llmEndpoint | default "https://litellm-prod.apps.maas.redhatworkshops.io/v1" | quote }}
        credentialsSecretRef:
          name: llm-credentials
        models:
          - name: {{ .Values.llmModel | default "granite-3-2-8b-instruct" }}
  ols:
    defaultProvider: litellm
    defaultModel: {{ .Values.llmModel | default "granite-3-2-8b-instruct" }}
    logLevel: INFO
    querySystemPrompt: |
      You have MCP tool functions available. When the user asks about
      cluster resources or operations, you MUST call the appropriate tool.
      Do NOT suggest CLI commands — use tools instead.

      Available tools for READING: pods_list, resources_list, resources_get,
      pods_log, pods_top, nodes_top, projects_list.
      For CREATING or UPDATING: resources_create_or_update (pass valid YAML).
      For DELETING: resources_delete.
      For SCALING: resources_scale.

      Always prefer tools over documentation answers.
    deployment:
      api:
        replicas: 1
      console:
        replicas: 1
      dataCollector: {}
      database:
        replicas: 1
      llamaStack: {}
      mcpServer: {}
    conversationCache:
      type: postgres
      postgres:
        maxConnections: 2000
        sharedBuffers: 256MB
    introspectionEnabled: true
    userDataCollection: {}
  mcpServers:
    - name: kubernetes-mcp-server
      url: "http://field-content-ols-k8s-mcp.openshift-lightspeed.svc.cluster.local:8085/mcp"
      timeout: 120
