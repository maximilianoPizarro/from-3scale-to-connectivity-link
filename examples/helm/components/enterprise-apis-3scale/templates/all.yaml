{{- $domain := .Values.clusterDomain -}}
{{- $microcksBase := .Values.microcksBaseUrl -}}
{{- range $i := until (.Values.userCount | int) }}
{{- $userNum := add $i 1 }}
{{- $ns := printf "user%d-neuralbank" (int $userNum) }}
{{- $prefix := printf "user%d" (int $userNum) }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: enterprise-apis-argocd-role
  namespace: {{ $ns }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
rules:
  - apiGroups: ["", "apps", "route.openshift.io"]
    resources: ["*"]
    verbs: ["*"]
  - apiGroups: ["capabilities.3scale.net"]
    resources: ["*"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: enterprise-apis-argocd-binding
  namespace: {{ $ns }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: enterprise-apis-argocd-role
subjects:
  - kind: ServiceAccount
    name: openshift-gitops-argocd-application-controller
    namespace: openshift-gitops
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: anyuid-default-enterprise
  namespace: {{ $ns }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:anyuid
subjects:
  - kind: ServiceAccount
    name: default
    namespace: {{ $ns }}
{{- range $.Values.apis }}
---
apiVersion: capabilities.3scale.net/v1beta1
kind: Backend
metadata:
  name: {{ $prefix }}-{{ .name }}-backend
  namespace: 3scale-system
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  labels:
    source-namespace: {{ $ns }}
    gateforge.io/user: {{ $prefix }}
spec:
  name: {{ printf "[%s] %s" $prefix .displayName | quote }}
  systemName: {{ printf "%s-%s" $prefix .systemName }}
  privateBaseURL: {{ printf "%s/rest/%s/%s" $microcksBase .microcksService .microcksVersion | quote }}
  description: {{ .description | quote }}
  mappingRules:
    {{- range .paths }}
    - httpMethod: {{ .method }}
      pattern: {{ .pattern | quote }}
      metricMethodRef: hits
      increment: 1
    {{- end }}
  metrics:
    hits:
      friendlyName: Hits
      unit: hit
      description: "Number of API hits"
---
apiVersion: capabilities.3scale.net/v1beta1
kind: Product
metadata:
  name: {{ $prefix }}-{{ .name }}-product
  namespace: 3scale-system
  annotations:
    argocd.argoproj.io/sync-wave: "5"
  labels:
    source-namespace: {{ $ns }}
    gateforge.io/user: {{ $prefix }}
spec:
  name: {{ printf "[%s] %s (%s)" $prefix .displayName (.authType | upper) | quote }}
  systemName: {{ printf "%s-%s" $prefix .systemName }}
  description: {{ .description | quote }}
  backendUsages:
    {{ printf "%s-%s" $prefix .systemName }}:
      path: /
  deployment:
    apicastHosted:
      authentication:
        {{- if eq .authType "oidc" }}
        oidc:
          issuerType: keycloak
          issuerEndpoint: "https://rhbk.{{ $domain }}/realms/{{ .keycloakRealm }}"
          jwtClaimWithClientID: azp
          jwtClaimWithClientIDType: plain
          authenticationFlow:
            standardFlowEnabled: true
            implicitFlowEnabled: false
            serviceAccountsEnabled: true
            directAccessGrantsEnabled: true
        {{- else }}
        userkey:
          authUserKey: user_key
          credentials: query
        {{- end }}
  applicationPlans:
    basic:
      name: "Basic Plan"
      limits:
        - period: minute
          value: {{ .basePlanLimit }}
          metricMethodRef:
            systemName: hits
    premium:
      name: "Premium Plan"
      limits:
        - period: minute
          value: {{ .premiumPlanLimit }}
          metricMethodRef:
            systemName: hits
{{- end }}
{{- end }}
