{{- $revision := .Values.gitopsRevision | default "main" }}
# APISource: Quarkus Microcks Operator imports artifacts with its own credentials
# (replaces PostSync Job that failed with HTTP 401 under Keycloak).
apiVersion: microcks.io/v1alpha1
kind: APISource
metadata:
  name: neuralbank-openapi
  namespace: microcks
  annotations:
    microcks.io/instance: microcks
    argocd.argoproj.io/sync-wave: "4"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  keepAPIOnDelete: false
  artifacts:
    - url: https://raw.githubusercontent.com/maximilianoPizarro/from-3scale-to-connectivity-link/{{ $revision }}/examples/helm/components/enterprise-apis-3scale/openapi/account-mgmt.json
      mainArtifact: true
    - url: https://raw.githubusercontent.com/maximilianoPizarro/from-3scale-to-connectivity-link/{{ $revision }}/examples/helm/components/enterprise-apis-3scale/openapi/wire-transfer.json
      mainArtifact: true
    - url: https://raw.githubusercontent.com/maximilianoPizarro/from-3scale-to-connectivity-link/{{ $revision }}/examples/helm/components/enterprise-apis-3scale/openapi/card-issuing.json
      mainArtifact: true
    - url: https://raw.githubusercontent.com/maximilianoPizarro/from-3scale-to-connectivity-link/{{ $revision }}/examples/helm/components/enterprise-apis-3scale/openapi/kyc-verification.json
      mainArtifact: true
