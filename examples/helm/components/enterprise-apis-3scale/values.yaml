clusterDomain: "apps.cluster.example.com"
userCount: 50
microcksBaseUrl: "http://microcks.microcks.svc.cluster.local:8080"

apis:
  - name: account-mgmt
    systemName: account-mgmt-api
    displayName: "Account Management API"
    description: "Account CRUD, balance queries, statement generation and multi-currency support"
    microcksService: "Account+Management+API"
    microcksVersion: "1.0"
    authType: oidc
    keycloakRealm: neuralbank
    basePlanLimit: 100
    premiumPlanLimit: 500
    paths:
      - method: GET
        pattern: "/api/v1/accounts$"
      - method: POST
        pattern: "/api/v1/accounts$"
      - method: GET
        pattern: "/api/v1/accounts/{id}$"
      - method: PUT
        pattern: "/api/v1/accounts/{id}$"
      - method: DELETE
        pattern: "/api/v1/accounts/{id}$"
      - method: GET
        pattern: "/api/v1/accounts/{id}/balance$"
      - method: GET
        pattern: "/api/v1/accounts/{id}/transactions$"
      - method: GET
        pattern: "/api/v1/accounts/{id}/statements$"
      - method: GET
        pattern: "/api/v1/accounts/{id}/statements/{period}$"
      - method: POST
        pattern: "/api/v1/accounts/{id}/freeze$"
      - method: POST
        pattern: "/api/v1/accounts/{id}/unfreeze$"
      - method: GET
        pattern: "/api/v1/accounts/{id}/beneficiaries$"
      - method: POST
        pattern: "/api/v1/accounts/{id}/beneficiaries$"
      - method: GET
        pattern: "/api/v1/currencies$"
      - method: GET
        pattern: "/api/v1/currencies/exchange-rates$"
      - method: GET
        pattern: "/q/health$"

  - name: wire-transfer
    systemName: wire-transfer-api
    displayName: "Wire Transfer API"
    description: "Domestic and international wire transfers, SWIFT messaging, and transfer status tracking"
    microcksService: "Wire+Transfer+API"
    microcksVersion: "1.0"
    authType: oidc
    keycloakRealm: neuralbank
    basePlanLimit: 50
    premiumPlanLimit: 300
    paths:
      - method: POST
        pattern: "/api/v1/transfers$"
      - method: GET
        pattern: "/api/v1/transfers$"
      - method: GET
        pattern: "/api/v1/transfers/{id}$"
      - method: GET
        pattern: "/api/v1/transfers/{id}/status$"
      - method: POST
        pattern: "/api/v1/transfers/{id}/cancel$"
      - method: POST
        pattern: "/api/v1/transfers/swift$"
      - method: POST
        pattern: "/api/v1/transfers/sepa$"
      - method: POST
        pattern: "/api/v1/transfers/ach$"
      - method: GET
        pattern: "/api/v1/transfers/{id}/receipt$"
      - method: POST
        pattern: "/api/v1/transfers/batch$"
      - method: GET
        pattern: "/api/v1/transfers/batch/{batchId}$"
      - method: GET
        pattern: "/api/v1/transfers/batch/{batchId}/status$"
      - method: GET
        pattern: "/api/v1/banks/swift-codes$"
      - method: GET
        pattern: "/api/v1/banks/swift-codes/{code}$"
      - method: POST
        pattern: "/api/v1/transfers/validate$"
      - method: GET
        pattern: "/q/health$"

  - name: card-issuing
    systemName: card-issuing-api
    displayName: "Card Issuing API"
    description: "Card provisioning, activation, limit management, and virtual card generation"
    microcksService: "Card+Issuing+API"
    microcksVersion: "1.0"
    authType: apikey
    basePlanLimit: 80
    premiumPlanLimit: 400
    paths:
      - method: GET
        pattern: "/api/v1/cards$"
      - method: POST
        pattern: "/api/v1/cards$"
      - method: GET
        pattern: "/api/v1/cards/{id}$"
      - method: PUT
        pattern: "/api/v1/cards/{id}/activate$"
      - method: PUT
        pattern: "/api/v1/cards/{id}/block$"
      - method: PUT
        pattern: "/api/v1/cards/{id}/unblock$"
      - method: PUT
        pattern: "/api/v1/cards/{id}/limits$"
      - method: GET
        pattern: "/api/v1/cards/{id}/limits$"
      - method: GET
        pattern: "/api/v1/cards/{id}/transactions$"
      - method: POST
        pattern: "/api/v1/cards/{id}/pin/reset$"
      - method: POST
        pattern: "/api/v1/cards/virtual$"
      - method: GET
        pattern: "/api/v1/cards/{id}/virtual-number$"
      - method: POST
        pattern: "/api/v1/cards/{id}/replace$"
      - method: GET
        pattern: "/api/v1/cards/{id}/disputes$"
      - method: POST
        pattern: "/api/v1/cards/{id}/disputes$"
      - method: GET
        pattern: "/q/health$"

  - name: kyc-verification
    systemName: kyc-verification-api
    displayName: "KYC Verification API"
    description: "Identity verification, document upload, AML screening, and compliance checks"
    microcksService: "KYC+Verification+API"
    microcksVersion: "1.0"
    authType: apikey
    basePlanLimit: 60
    premiumPlanLimit: 250
    paths:
      - method: POST
        pattern: "/api/v1/kyc/verify$"
      - method: GET
        pattern: "/api/v1/kyc/{id}$"
      - method: GET
        pattern: "/api/v1/kyc/{id}/status$"
      - method: GET
        pattern: "/api/v1/kyc/{id}/report$"
      - method: POST
        pattern: "/api/v1/kyc/documents$"
      - method: GET
        pattern: "/api/v1/kyc/{id}/documents$"
      - method: GET
        pattern: "/api/v1/kyc/documents/{docId}$"
      - method: POST
        pattern: "/api/v1/kyc/aml-screening$"
      - method: GET
        pattern: "/api/v1/kyc/aml-screening/{id}$"
      - method: POST
        pattern: "/api/v1/kyc/pep-check$"
      - method: POST
        pattern: "/api/v1/kyc/sanctions-check$"
      - method: POST
        pattern: "/api/v1/kyc/address-verification$"
      - method: GET
        pattern: "/api/v1/kyc/risk-assessment/{customerId}$"
      - method: POST
        pattern: "/api/v1/kyc/biometric$"
      - method: GET
        pattern: "/api/v1/kyc/compliance-report/{customerId}$"
      - method: GET
        pattern: "/q/health$"
