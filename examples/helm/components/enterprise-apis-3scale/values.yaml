clusterDomain: "apps.cluster.example.com"
userCount: 50
microcksBaseUrl: "http://microcks.microcks.svc.cluster.local:8080"

apis:
  - name: account-mgmt
    systemName: account-mgmt-api
    displayName: "Account Management API"
    description: "Account CRUD, balance queries, statement generation and multi-currency support"
    microcksService: "Account+Management+API"
    microcksVersion: "1.0"
    authType: oidc
    keycloakRealm: neuralbank
    basePlanLimit: 100
    premiumPlanLimit: 500
    paths:
      - method: GET
        pattern: "/api/v1/accounts$"
      - method: GET
        pattern: "/api/v1/accounts/{id}$"
      - method: POST
        pattern: "/api/v1/accounts$"
      - method: GET
        pattern: "/api/v1/accounts/{id}/balance$"

  - name: wire-transfer
    systemName: wire-transfer-api
    displayName: "Wire Transfer API"
    description: "Domestic and international wire transfers, SWIFT messaging, and transfer status tracking"
    microcksService: "Wire+Transfer+API"
    microcksVersion: "1.0"
    authType: oidc
    keycloakRealm: neuralbank
    basePlanLimit: 50
    premiumPlanLimit: 300
    paths:
      - method: POST
        pattern: "/api/v1/transfers$"
      - method: GET
        pattern: "/api/v1/transfers/{id}$"
      - method: GET
        pattern: "/api/v1/transfers/{id}/status$"
      - method: POST
        pattern: "/api/v1/transfers/swift$"

  - name: card-issuing
    systemName: card-issuing-api
    displayName: "Card Issuing API"
    description: "Card provisioning, activation, limit management, and virtual card generation"
    microcksService: "Card+Issuing+API"
    microcksVersion: "1.0"
    authType: apikey
    basePlanLimit: 80
    premiumPlanLimit: 400
    paths:
      - method: POST
        pattern: "/api/v1/cards$"
      - method: GET
        pattern: "/api/v1/cards/{id}$"
      - method: PUT
        pattern: "/api/v1/cards/{id}/activate$"
      - method: PUT
        pattern: "/api/v1/cards/{id}/limits$"

  - name: kyc-verification
    systemName: kyc-verification-api
    displayName: "KYC Verification API"
    description: "Identity verification, document upload, AML screening, and compliance checks"
    microcksService: "KYC+Verification+API"
    microcksVersion: "1.0"
    authType: apikey
    basePlanLimit: 60
    premiumPlanLimit: 250
    paths:
      - method: POST
        pattern: "/api/v1/kyc/verify$"
      - method: POST
        pattern: "/api/v1/kyc/documents$"
      - method: GET
        pattern: "/api/v1/kyc/{id}/status$"
      - method: GET
        pattern: "/api/v1/kyc/{id}/report$"
