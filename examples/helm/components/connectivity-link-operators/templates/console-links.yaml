{{- $domain := .Values.clusterDomain | default "apps.cluster.example.com" }}
---
apiVersion: console.openshift.io/v1
kind: ConsoleLink
metadata:
  name: workshop-registration-link
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  href: https://workshop-registration.{{ $domain }}
  location: ApplicationMenu
  text: Workshop Registration
  applicationMenu:
    section: Workshop Tools
    imageURL: https://raw.githubusercontent.com/openshift/console/master/frontend/public/imgs/logos/openshift-platform.svg
---
