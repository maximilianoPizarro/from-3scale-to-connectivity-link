apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: nfl-wallet-3scale-system
  description: "NFL Wallet API secured with Red Hat 3scale API Management (API Key)"
  tags:
    - 3scale
    - api-key
    - nfl-wallet
    - migration-source
spec:
  owner: platform-engineering
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: nfl-wallet-3scale-api
  description: "NFL Wallet API — secured via 3scale API Key (user_key)"
  annotations:
    backstage.io/kubernetes-id: nfl-wallet-3scale-api
  tags:
    - java
    - quarkus
    - 3scale
    - api-key
spec:
  type: service
  lifecycle: production
  owner: platform-engineering
  system: nfl-wallet-3scale-system
  providesApis:
    - nfl-wallet-3scale-api-def
---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: nfl-wallet-3scale-api-def
  description: "NFL Wallet Customer API — 3scale API Key"
  tags:
    - rest
    - 3scale
    - api-key
spec:
  type: openapi
  lifecycle: production
  owner: platform-engineering
  system: nfl-wallet-3scale-system
  definition: |
    openapi: "3.0.3"
    info:
      title: "NFL Wallet Customer API (3scale)"
      version: "1.0.0"
      description: "API REST secured by Red Hat 3scale with API Key (user_key) authentication"
    paths:
      /api/v1/customers:
        get:
          summary: List all customers
          security:
            - apiKey: []
        post:
          summary: Create a new customer
          security:
            - apiKey: []
      /api/v1/customers/{id}:
        get:
          summary: Get customer by ID
          security:
            - apiKey: []
    components:
      securitySchemes:
        apiKey:
          type: apiKey
          in: query
          name: user_key
