apiVersion: v1
kind: Namespace
metadata:
  name: nfl-wallet-3scale
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    kubernetes.io/metadata.name: nfl-wallet-3scale
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: nfl-wallet-3scale-argocd-role
  namespace: nfl-wallet-3scale
  annotations:
    argocd.argoproj.io/sync-wave: "1"
rules:
  - apiGroups: ["", "apps", "route.openshift.io"]
    resources: ["*"]
    verbs: ["*"]
  - apiGroups: ["capabilities.3scale.net"]
    resources: ["*"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: nfl-wallet-3scale-argocd-binding
  namespace: nfl-wallet-3scale
  annotations:
    argocd.argoproj.io/sync-wave: "1"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: nfl-wallet-3scale-argocd-role
subjects:
  - kind: ServiceAccount
    name: openshift-gitops-argocd-application-controller
    namespace: openshift-gitops
---
apiVersion: capabilities.3scale.net/v1beta1
kind: Backend
metadata:
  name: nfl-wallet-backend-api
  namespace: 3scale-system
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  name: "NFL Wallet Backend API"
  systemName: nfl-wallet-backend-api
  privateBaseURL: "http://nfl-wallet-api.nfl-wallet-prod.svc.cluster.local:8080"
  mappingRules:
    - httpMethod: GET
      pattern: "/api/v1/customers$"
      metricMethodRef: hits
      increment: 1
    - httpMethod: GET
      pattern: "/api/v1/customers/{id}$"
      metricMethodRef: hits
      increment: 1
    - httpMethod: POST
      pattern: "/api/v1/customers$"
      metricMethodRef: hits
      increment: 1
  metrics:
    hits:
      friendlyName: Hits
      unit: hit
      description: Number of API hits
---
apiVersion: capabilities.3scale.net/v1beta1
kind: Product
metadata:
  name: nfl-wallet-apikey-product
  namespace: 3scale-system
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  name: "NFL Wallet API (API Key)"
  systemName: nfl-wallet-apikey
  backendUsages:
    nfl-wallet-backend-api:
      path: /
  deployment:
    apicastHosted:
      authentication:
        userkey:
          authUserKey: user_key
          credentials: query
  applicationPlans:
    basic:
      name: "Basic Plan"
      limits:
        - period: minute
          value: 120
          metricMethodRef:
            systemName: hits
    premium:
      name: "Premium Plan"
      limits:
        - period: minute
          value: 600
          metricMethodRef:
            systemName: hits
---
apiVersion: capabilities.3scale.net/v1beta1
kind: ActiveDoc
metadata:
  name: nfl-wallet-activedoc
  namespace: 3scale-system
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  name: "NFL Wallet Customer API"
  productSystemName: nfl-wallet-apikey
  activeDocOpenAPIRef:
    url: "https://nfl-wallet.{{ .Values.clusterDomain }}/q/openapi"
  published: true
