apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: 3scale
  namespace: default
  description: "Red Hat 3scale API Management — source APIs discovered automatically by the 3scale plugin"
  tags:
    - 3scale
    - api-management
    - red-hat
  links:
    - title: 3scale Admin Portal
      url: https://3scale-admin.apps.cluster-4wrc6.dynamic.redhatworkshops.io
      icon: dashboard
spec:
  owner: group:default/3scale
  domain: api-management

---
apiVersion: backstage.io/v1alpha1
kind: Group
metadata:
  name: 3scale
  namespace: default
  description: "3scale API Management administrators and platform engineers responsible for API governance"
  tags:
    - 3scale
    - platform-engineering
spec:
  type: team
  profile:
    displayName: 3scale Administrators
    picture: https://access.redhat.com/sites/default/files/images/3scale-icon.png
  children: []
  members:
    - platformadmin
    - maximilianopizarro
    - user1
    - user2
    - user3
    - user4
    - user5

---
apiVersion: backstage.io/v1alpha1
kind: Domain
metadata:
  name: api-management
  namespace: default
  description: "API Management domain — encompasses 3scale source APIs and Connectivity Link migrated APIs"
  tags:
    - api-management
spec:
  owner: group:default/3scale
