##
## LLM credentials for OLS provider
##
apiVersion: v1
kind: Secret
metadata:
  name: llm-credentials
  namespace: openshift-lightspeed
  annotations:
    argocd.argoproj.io/sync-wave: "1"
type: Opaque
stringData:
  apitoken: {{ .Values.llmApiKey | default "sk-no-key" | quote }}
---
##
## RHDH MCP auth token for OLS → Developer Hub MCP integration
##
apiVersion: v1
kind: Secret
metadata:
  name: rhdh-mcp-token
  namespace: openshift-lightspeed
  annotations:
    argocd.argoproj.io/sync-wave: "1"
type: Opaque
stringData:
  header: "Bearer {{ .Values.rhdhBackendSecret | default "a01bb6ee68d5afbd9e82402b1a37a73d900bc653d6dc2375dec06bce6d62f34d" }}"
---
##
## OLSConfig — Granite (direct) + MCP servers for tool calling
##
apiVersion: ols.openshift.io/v1alpha1
kind: OLSConfig
metadata:
  name: cluster
  labels:
    app.kubernetes.io/part-of: connectivity-link-lightspeed
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  featureGates:
    - MCPServer
  llm:
    providers:
      - name: granite-local
        type: openai
        url: {{ .Values.llmEndpoint | default "http://granite-3-2-8b-instruct-metrics.openshift-ai-models.svc.cluster.local:8080/v1" | quote }}
        credentialsSecretRef:
          name: llm-credentials
        models:
          - name: {{ .Values.llmModel | default "granite-3.2-8b-instruct" }}
  ols:
    defaultProvider: granite-local
    defaultModel: {{ .Values.llmModel | default "granite-3.2-8b-instruct" }}
    logLevel: INFO
    querySystemPrompt: |
      You are an OpenShift cluster assistant with MCP tools.
      ALWAYS call tools to answer questions about cluster resources.
      Do NOT suggest CLI commands. Use tool calls instead.
      Choose the most specific tool from the available functions.
    deployment:
      api:
        replicas: 1
      console:
        replicas: 1
      dataCollector: {}
      database:
        replicas: 1
      llamaStack: {}
      mcpServer: {}
    conversationCache:
      type: postgres
      postgres:
        maxConnections: 2000
        sharedBuffers: 256MB
    introspectionEnabled: true
    userDataCollection: {}
  mcpServers:
    - name: mcp-gateway
      url: "http://mcp-gateway-istio.mcp-system.svc.cluster.local:8080/mcp"
      timeout: 120
    - name: rhdh-catalog
      url: "http://backstage-developer-hub.developer-hub.svc.cluster.local/api/mcp-actions/v1"
      timeout: 120
      headers:
        - name: Authorization
          valueFrom:
            type: secret
            secretRef:
              name: rhdh-mcp-token
