clusterDomain: "apps.cluster.example.com"

mockImage: quay.io/maximilianopizarro/neuralbank-backend:latest

apis:
  - name: payment-gateway
    systemName: payment-gateway-api
    displayName: "Payment Gateway API"
    description: "Processes card transactions, refunds, and settlement reports"
    authType: oidc
    keycloakRealm: neuralbank
    basePlanLimit: 100
    premiumPlanLimit: 500
    paths:
      - method: POST
        pattern: "/api/v1/payments$"
      - method: GET
        pattern: "/api/v1/payments/{id}$"
      - method: POST
        pattern: "/api/v1/refunds$"
      - method: GET
        pattern: "/api/v1/settlements$"

  - name: inventory-service
    systemName: inventory-service-api
    displayName: "Inventory Service API"
    description: "Real-time stock levels, warehouse locations, and reorder triggers"
    authType: apikey
    basePlanLimit: 200
    premiumPlanLimit: 1000
    paths:
      - method: GET
        pattern: "/api/v1/products$"
      - method: GET
        pattern: "/api/v1/products/{sku}$"
      - method: PUT
        pattern: "/api/v1/products/{sku}/stock$"
      - method: GET
        pattern: "/api/v1/warehouses$"

  - name: order-management
    systemName: order-management-api
    displayName: "Order Management API"
    description: "Order lifecycle from creation through fulfillment and returns"
    authType: oidc
    keycloakRealm: neuralbank
    basePlanLimit: 150
    premiumPlanLimit: 750
    backends:
      - systemName: order-mgmt-orders-backend
        displayName: "Orders Backend"
        pathPrefix: /api/v1/orders
        paths:
          - method: POST
            pattern: "/api/v1/orders$"
          - method: GET
            pattern: "/api/v1/orders/{id}$"
          - method: PUT
            pattern: "/api/v1/orders/{id}/status$"
          - method: GET
            pattern: "/api/v1/orders$"
      - systemName: order-mgmt-returns-backend
        displayName: "Returns Backend"
        pathPrefix: /api/v1/returns
        paths:
          - method: POST
            pattern: "/api/v1/returns$"

  - name: customer-loyalty
    systemName: customer-loyalty-api
    displayName: "Customer Loyalty API"
    description: "Points balance, tier status, and reward redemption"
    authType: apikey
    basePlanLimit: 300
    premiumPlanLimit: 1500
    paths:
      - method: GET
        pattern: "/api/v1/members/{id}$"
      - method: GET
        pattern: "/api/v1/members/{id}/points$"
      - method: POST
        pattern: "/api/v1/members/{id}/redeem$"
      - method: GET
        pattern: "/api/v1/tiers$"

  - name: shipping-tracker
    systemName: shipping-tracker-api
    displayName: "Shipping Tracker API"
    description: "Carrier integration, tracking events, and delivery estimates"
    authType: apikey
    basePlanLimit: 250
    premiumPlanLimit: 1200
    paths:
      - method: POST
        pattern: "/api/v1/shipments$"
      - method: GET
        pattern: "/api/v1/shipments/{id}$"
      - method: GET
        pattern: "/api/v1/shipments/{id}/tracking$"
      - method: GET
        pattern: "/api/v1/carriers$"

  - name: notification-hub
    systemName: notification-hub-api
    displayName: "Notification Hub API"
    description: "Multi-channel notifications — email, SMS, push, and webhooks"
    authType: oidc
    keycloakRealm: neuralbank
    basePlanLimit: 500
    premiumPlanLimit: 2000
    paths:
      - method: POST
        pattern: "/api/v1/notifications$"
      - method: GET
        pattern: "/api/v1/notifications/{id}$"
      - method: GET
        pattern: "/api/v1/channels$"
      - method: POST
        pattern: "/api/v1/webhooks$"
