apiVersion: v1
kind: Namespace
metadata:
  name: mock-apis-3scale
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    kubernetes.io/metadata.name: mock-apis-3scale
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: mock-apis-argocd-role
  namespace: mock-apis-3scale
  annotations:
    argocd.argoproj.io/sync-wave: "1"
rules:
  - apiGroups: ["", "apps", "route.openshift.io"]
    resources: ["*"]
    verbs: ["*"]
  - apiGroups: ["capabilities.3scale.net"]
    resources: ["*"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: mock-apis-argocd-binding
  namespace: mock-apis-3scale
  annotations:
    argocd.argoproj.io/sync-wave: "1"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: mock-apis-argocd-role
subjects:
  - kind: ServiceAccount
    name: openshift-gitops-argocd-application-controller
    namespace: openshift-gitops
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: anyuid-default-mock-apis
  namespace: mock-apis-3scale
  annotations:
    argocd.argoproj.io/sync-wave: "1"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:anyuid
subjects:
  - kind: ServiceAccount
    name: default
    namespace: mock-apis-3scale
{{- range .Values.apis }}
{{- $api := . }}
---
# ============================================================
# {{ .displayName }} — Deployment + Service + Route
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .name }}
  namespace: mock-apis-3scale
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
    app: {{ .name }}
    backstage.io/kubernetes-id: mock-{{ .name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .name }}
  template:
    metadata:
      labels:
        app: {{ .name }}
    spec:
      containers:
        - name: api
          image: {{ $.Values.mockImage }}
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: QUARKUS_DATASOURCE_JDBC_URL
              value: "jdbc:postgresql://mock-shared-db:5432/mockapis"
            - name: QUARKUS_DATASOURCE_USERNAME
              value: "mockapis"
            - name: QUARKUS_DATASOURCE_PASSWORD
              value: "mockapis123!"
            - name: QUARKUS_SMALLRYE_OPENAPI_SERVERS
              value: "https://{{ .name }}-mock.{{ $.Values.clusterDomain }}"
          readinessProbe:
            httpGet:
              path: /q/health/ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /q/health/live
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .name }}
  namespace: mock-apis-3scale
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  selector:
    app: {{ .name }}
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: {{ .name }}
  namespace: mock-apis-3scale
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  host: {{ .name }}-mock.{{ $.Values.clusterDomain }}
  port:
    targetPort: 8080
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  to:
    kind: Service
    name: {{ .name }}
    weight: 100
---
# ============================================================
# {{ .displayName }} — 3scale Backend
# ============================================================
{{- if .backends }}
{{- range .backends }}
---
apiVersion: capabilities.3scale.net/v1beta1
kind: Backend
metadata:
  name: {{ .systemName }}-backend
  namespace: 3scale-system
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  name: {{ .displayName | quote }}
  systemName: {{ .systemName }}
  privateBaseURL: "http://{{ $api.name }}.mock-apis-3scale.svc.cluster.local:8080"
  description: {{ .displayName | quote }}
  mappingRules:
    {{- range .paths }}
    - httpMethod: {{ .method }}
      pattern: {{ .pattern | quote }}
      metricMethodRef: hits
      increment: 1
    {{- end }}
  metrics:
    hits:
      friendlyName: Hits
      unit: hit
      description: "Number of API hits"
{{- end }}
{{- else }}
---
apiVersion: capabilities.3scale.net/v1beta1
kind: Backend
metadata:
  name: {{ .name }}-backend
  namespace: 3scale-system
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  name: {{ .displayName | quote }}
  systemName: {{ .systemName }}
  privateBaseURL: "http://{{ .name }}.mock-apis-3scale.svc.cluster.local:8080"
  description: {{ .description | quote }}
  mappingRules:
    {{- range .paths }}
    - httpMethod: {{ .method }}
      pattern: {{ .pattern | quote }}
      metricMethodRef: hits
      increment: 1
    {{- end }}
  metrics:
    hits:
      friendlyName: Hits
      unit: hit
      description: "Number of API hits"
{{- end }}
---
# ============================================================
# {{ .displayName }} — 3scale Product ({{ .authType }})
# ============================================================
{{- if .backends }}
---
apiVersion: capabilities.3scale.net/v1beta1
kind: Product
metadata:
  name: {{ .name }}-product
  namespace: 3scale-system
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  name: {{ printf "%s (%s)" .displayName (upper .authType) | quote }}
  systemName: {{ .systemName }}
  description: {{ .description | quote }}
  backendUsages:
    {{- range .backends }}
    {{ .systemName }}:
      path: {{ .pathPrefix }}
    {{- end }}
  deployment:
    apicastHosted:
      authentication:
        {{- if eq .authType "oidc" }}
        oidc:
          issuerType: keycloak
          issuerEndpoint: "https://rhbk.{{ $.Values.clusterDomain }}/realms/{{ .keycloakRealm }}"
          jwtClaimWithClientID: azp
          jwtClaimWithClientIDType: plain
          authenticationFlow:
            standardFlowEnabled: true
            implicitFlowEnabled: false
            serviceAccountsEnabled: true
            directAccessGrantsEnabled: true
        {{- else }}
        userkey:
          authUserKey: user_key
          credentials: query
        {{- end }}
  applicationPlans:
    basic:
      name: "Basic Plan"
      limits:
        - period: minute
          value: {{ .basePlanLimit }}
          metricMethodRef:
            systemName: hits
    premium:
      name: "Premium Plan"
      limits:
        - period: minute
          value: {{ .premiumPlanLimit }}
          metricMethodRef:
            systemName: hits
{{- else }}
---
apiVersion: capabilities.3scale.net/v1beta1
kind: Product
metadata:
  name: {{ .name }}-product
  namespace: 3scale-system
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  name: {{ printf "%s (%s)" .displayName (upper .authType) | quote }}
  systemName: {{ .systemName }}
  description: {{ .description | quote }}
  backendUsages:
    {{ .systemName }}:
      path: /
  deployment:
    apicastHosted:
      authentication:
        {{- if eq .authType "oidc" }}
        oidc:
          issuerType: keycloak
          issuerEndpoint: "https://rhbk.{{ $.Values.clusterDomain }}/realms/{{ .keycloakRealm }}"
          jwtClaimWithClientID: azp
          jwtClaimWithClientIDType: plain
          authenticationFlow:
            standardFlowEnabled: true
            implicitFlowEnabled: false
            serviceAccountsEnabled: true
            directAccessGrantsEnabled: true
        {{- else }}
        userkey:
          authUserKey: user_key
          credentials: query
        {{- end }}
  applicationPlans:
    basic:
      name: "Basic Plan"
      limits:
        - period: minute
          value: {{ .basePlanLimit }}
          metricMethodRef:
            systemName: hits
    premium:
      name: "Premium Plan"
      limits:
        - period: minute
          value: {{ .premiumPlanLimit }}
          metricMethodRef:
            systemName: hits
{{- end }}
---
# ============================================================
# {{ .displayName }} — 3scale ActiveDoc
# ============================================================
apiVersion: capabilities.3scale.net/v1beta1
kind: ActiveDoc
metadata:
  name: {{ .name }}-activedoc
  namespace: 3scale-system
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  name: {{ .displayName | quote }}
  productSystemName: {{ .systemName }}
  activeDocOpenAPIRef:
    url: "https://{{ .name }}-mock.{{ $.Values.clusterDomain }}/q/openapi"
  published: true
{{- end }}
---
# ============================================================
# Shared PostgreSQL for all mock APIs
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-shared-db
  namespace: mock-apis-3scale
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
    app: mock-shared-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mock-shared-db
  template:
    metadata:
      labels:
        app: mock-shared-db
    spec:
      containers:
        - name: postgresql
          image: registry.redhat.io/rhel8/postgresql-15:latest
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRESQL_USER
              value: "mockapis"
            - name: POSTGRESQL_PASSWORD
              value: "mockapis123!"
            - name: POSTGRESQL_DATABASE
              value: "mockapis"
          volumeMounts:
            - name: db-data
              mountPath: /var/lib/pgsql/data
      volumes:
        - name: db-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: mock-shared-db
  namespace: mock-apis-3scale
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  selector:
    app: mock-shared-db
  ports:
    - port: 5432
      targetPort: 5432
