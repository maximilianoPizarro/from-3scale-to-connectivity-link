##
## 1. PVC — persistent storage for the GGUF model file
##
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: granite-model-storage
  namespace: openshift-ai-models
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  storageClassName: ocs-external-storagecluster-ceph-rbd-immediate
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.model.storageSize | default "10Gi" }}
---
##
## 2. Job — download GGUF model from HuggingFace (idempotent)
##
apiVersion: batch/v1
kind: Job
metadata:
  name: download-granite-model
  namespace: openshift-ai-models
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 1800
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: downloader
          image: registry.access.redhat.com/ubi9/ubi:latest
          command:
            - /bin/bash
            - -c
            - |
              set -e
              MODEL_DIR="/models"
              MODEL_FILE="${MODEL_DIR}/{{ .Values.model.filename }}"

              if [ -f "$MODEL_FILE" ]; then
                ACTUAL=$(stat -c%s "$MODEL_FILE" 2>/dev/null || echo "0")
                if [ "$ACTUAL" -gt 1000000000 ]; then
                  echo "[OK] Model already downloaded ($(( ACTUAL / 1073741824 )) GiB), skipping"
                  exit 0
                fi
                echo "[WARN] Incomplete file detected, re-downloading..."
                rm -f "$MODEL_FILE"
              fi

              echo "[DOWNLOAD] Fetching {{ .Values.model.filename }} from HuggingFace..."
              curl -L --progress-bar -o "$MODEL_FILE" \
                "{{ .Values.model.downloadUrl }}"

              SIZE=$(stat -c%s "$MODEL_FILE")
              echo "[OK] Download complete: $(( SIZE / 1073741824 )) GiB"
          resources:
            requests:
              cpu: "500m"
              memory: "256Mi"
            limits:
              cpu: "2"
              memory: "512Mi"
          volumeMounts:
            - name: model-storage
              mountPath: /models
      volumes:
        - name: model-storage
          persistentVolumeClaim:
            claimName: granite-model-storage
---
##
## 3. ServingRuntime — llama.cpp CPU runtime for KServe
##
apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  name: llamacpp-cpu-runtime
  namespace: openshift-ai-models
  labels:
    opendatahub.io/dashboard: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    opendatahub.io/apiProtocol: REST
    opendatahub.io/template-display-name: "llama.cpp CPU ServingRuntime for KServe"
    opendatahub.io/template-name: llamacpp-cpu-runtime
    openshift.io/display-name: "llama.cpp CPU ServingRuntime for KServe"
spec:
  annotations:
    prometheus.io/path: /metrics
    prometheus.io/port: "8080"
  containers:
    - name: kserve-container
      image: {{ .Values.runtime.image | default "ghcr.io/ggml-org/llama.cpp:server-b9038" }}
      command:
        - llama-server
      args:
        - --host=0.0.0.0
        - --port=8080
        - "--model=/mnt/models/{{ .Values.model.filename }}"
        - "--ctx-size={{ .Values.runtime.ctxSize | default 4096 }}"
        - --n-gpu-layers=0
        - --jinja
      ports:
        - containerPort: 8080
          protocol: TCP
  multiModel: false
  supportedModelFormats:
    - autoSelect: true
      name: GGUF
---
##
## 4. InferenceService — visible in OpenShift AI console
##
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: granite-3-1-8b-instruct
  namespace: openshift-ai-models
  labels:
    opendatahub.io/dashboard: "true"
    opendatahub.io/genai-asset: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    opendatahub.io/model-type: generative
    openshift.io/display-name: {{ .Values.model.displayName | quote }}
    security.opendatahub.io/enable-auth: "false"
    serving.kserve.io/deploymentMode: RawDeployment
    serving.kserve.io/stop: "false"
spec:
  predictor:
    automountServiceAccountToken: false
    maxReplicas: 1
    minReplicas: 1
    model:
      modelFormat:
        name: GGUF
      name: ""
      runtime: llamacpp-cpu-runtime
      storageUri: pvc://granite-model-storage/
      resources:
        requests:
          cpu: {{ .Values.resources.requests.cpu | quote }}
          memory: {{ .Values.resources.requests.memory | quote }}
        limits:
          cpu: {{ .Values.resources.limits.cpu | quote }}
          memory: {{ .Values.resources.limits.memory | quote }}
---
##
## 5. Route — expose the OpenAI-compatible API externally
##
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: granite-3-1-8b-instruct
  namespace: openshift-ai-models
  annotations:
    argocd.argoproj.io/sync-wave: "4"
    haproxy.router.openshift.io/timeout: 300s
spec:
  to:
    kind: Service
    name: granite-3-1-8b-instruct-api
    weight: 100
  port:
    targetPort: 8080
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
