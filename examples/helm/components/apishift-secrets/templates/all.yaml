apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.destinationNamespace | default "gateforge" }}
  labels:
    app.kubernetes.io/part-of: apishift
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secretName | default "gateforge-ai-secret" }}
  namespace: {{ .Values.destinationNamespace | default "gateforge" }}
  labels:
    app.kubernetes.io/part-of: apishift
    app.kubernetes.io/component: ai-credentials
  annotations:
    argocd.argoproj.io/sync-wave: "8"
type: Opaque
stringData:
  AI_API_KEY: {{ .Values.aiApiKey | default "" | quote }}
