---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: nfl-wallet-api
  namespace: default
  description: "NFL Wallet REST API — endpoints de billetera digital protegidos con API Key (header X-API-Key)"
  tags:
    - rest
    - openapi
    - api-key
    - kuadrant
spec:
  type: openapi
  lifecycle: production
  owner: platform-engineering
  system: nfl-wallet-system
  definition: |
    openapi: "3.0.3"
    info:
      title: NFL Wallet API
      description: |
        API REST para gestión de billeteras digitales, cuentas y transacciones.
        Protegida por Kuadrant AuthPolicy con autenticación API Key.
        Incluye RateLimitPolicy de 120 req/min.
      version: "1.0.0"
      contact:
        name: Platform Engineering
    servers:
      - url: https://nfl-wallet.apps.cluster-l9nhj.dynamic.redhatworkshops.io
        description: Producción (nfl-wallet-prod)
    security:
      - ApiKeyAuth: []
    paths:
      /api/wallets:
        get:
          summary: Listar billeteras
          description: Retorna todas las billeteras registradas
          responses:
            '200':
              description: Lista de billeteras
              content:
                application/json:
                  schema:
                    type: array
                    items:
                      $ref: '#/components/schemas/Wallet'
            '401':
              description: API key inválida o faltante
        post:
          summary: Crear billetera
          requestBody:
            required: true
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/WalletCreate'
          responses:
            '201':
              description: Billetera creada
            '401':
              description: API key inválida o faltante
      /api/wallets/{id}:
        get:
          summary: Obtener billetera por ID
          parameters:
            - name: id
              in: path
              required: true
              schema:
                type: integer
          responses:
            '200':
              description: Datos de la billetera
            '404':
              description: Billetera no encontrada
      /api/wallets/{id}/transactions:
        get:
          summary: Listar transacciones de una billetera
          parameters:
            - name: id
              in: path
              required: true
              schema:
                type: integer
          responses:
            '200':
              description: Lista de transacciones
        post:
          summary: Crear transacción
          parameters:
            - name: id
              in: path
              required: true
              schema:
                type: integer
          requestBody:
            required: true
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/TransactionCreate'
          responses:
            '201':
              description: Transacción registrada
      /api/wallets/{id}/balance:
        get:
          summary: Consultar saldo
          parameters:
            - name: id
              in: path
              required: true
              schema:
                type: integer
          responses:
            '200':
              description: Saldo actual de la billetera
    components:
      securitySchemes:
        ApiKeyAuth:
          type: apiKey
          in: header
          name: X-API-Key
          description: |
            API Key para autenticación. Enviar en header X-API-Key.
            Keys disponibles: nfl-wallet-demo-key-2024 (admin), nfl-wallet-readonly-key-2024 (readonly)
      schemas:
        Wallet:
          type: object
          properties:
            id:
              type: integer
            owner:
              type: string
            balance:
              type: number
              format: double
            currency:
              type: string
            createdAt:
              type: string
              format: date-time
        WalletCreate:
          type: object
          required:
            - owner
            - currency
          properties:
            owner:
              type: string
            currency:
              type: string
              default: ARS
        TransactionCreate:
          type: object
          required:
            - amount
            - type
          properties:
            amount:
              type: number
              format: double
            type:
              type: string
              enum: [deposit, withdrawal, transfer]
            description:
              type: string
