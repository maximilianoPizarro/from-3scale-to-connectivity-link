  namespace: default
  description: "NFL Wallet API — servicio REST de billetera digital con autenticación API Key vía Kuadrant AuthPolicy"
  annotations:
    backstage.io/kubernetes-id: nfl-wallet
    backstage.io/kubernetes-namespace: nfl-wallet-prod
    argocd/app-name: field-content-connectivity-link-nfl-wallet
    argocd/app-namespace: openshift-gitops
    backstage.io/techdocs-ref: dir:.
  tags:
    - quarkus
    - java
    - rest-api
    - api-key
    - kuadrant
  links:
    - url: https://nfl-wallet.apps.cluster-l9nhj.dynamic.redhatworkshops.io/q/swagger-ui
      title: Swagger UI
      icon: api
    - url: https://nfl-wallet.apps.cluster-l9nhj.dynamic.redhatworkshops.io/api
