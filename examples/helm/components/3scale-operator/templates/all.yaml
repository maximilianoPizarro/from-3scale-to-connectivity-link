apiVersion: v1
kind: Namespace
metadata:
  name: 3scale-system
  annotations:
    argocd.argoproj.io/sync-wave: "0"
---
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: 3scale-operator-group
  namespace: 3scale-system
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  targetNamespaces:
    - 3scale-system
---
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: 3scale-operator
  namespace: 3scale-system
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  channel: threescale-2.16
  installPlanApproval: Automatic
  name: 3scale-operator
  source: redhat-operators
  sourceNamespace: openshift-marketplace
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: 3scale-argocd-role
  namespace: 3scale-system
  annotations:
    argocd.argoproj.io/sync-wave: "1"
rules:
  - apiGroups: [""]
    resources: ["*"]
    verbs: ["*"]
  - apiGroups: ["apps"]
    resources: ["*"]
    verbs: ["*"]
  - apiGroups: ["apps.3scale.net"]
    resources: ["*"]
    verbs: ["*"]
  - apiGroups: ["capabilities.3scale.net"]
    resources: ["*"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: 3scale-argocd-binding
  namespace: 3scale-system
  annotations:
    argocd.argoproj.io/sync-wave: "1"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: 3scale-argocd-role
subjects:
  - kind: ServiceAccount
    name: openshift-gitops-argocd-application-controller
    namespace: openshift-gitops
---
# ============================================================
# External databases required by 3scale 2.16 operator
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-redis
  namespace: 3scale-system
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
    app: backend-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend-redis
  template:
    metadata:
      labels:
        app: backend-redis
    spec:
      containers:
        - name: redis
          image: registry.redhat.io/rhel9/redis-7:latest
          ports:
            - containerPort: 6379
          env:
            - name: REDIS_PASSWORD
              value: "backendredis123"
---
apiVersion: v1
kind: Service
metadata:
  name: backend-redis
  namespace: 3scale-system
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  selector:
    app: backend-redis
  ports:
    - port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: system-redis
  namespace: 3scale-system
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
    app: system-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: system-redis
  template:
    metadata:
      labels:
        app: system-redis
    spec:
      containers:
        - name: redis
          image: registry.redhat.io/rhel9/redis-7:latest
          ports:
            - containerPort: 6379
          env:
            - name: REDIS_PASSWORD
              value: "systemredis123"
---
apiVersion: v1
kind: Service
metadata:
  name: system-redis
  namespace: 3scale-system
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  selector:
    app: system-redis
  ports:
    - port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: system-postgresql
  namespace: 3scale-system
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
    app: system-postgresql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: system-postgresql
  template:
    metadata:
      labels:
        app: system-postgresql
    spec:
      containers:
        - name: postgresql
          image: registry.redhat.io/rhel8/postgresql-15:latest
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRESQL_USER
              value: "system"
            - name: POSTGRESQL_PASSWORD
              value: "system3scale"
            - name: POSTGRESQL_DATABASE
              value: "system"
          volumeMounts:
            - name: data
              mountPath: /var/lib/pgsql/data
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: system-postgresql
  namespace: 3scale-system
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  selector:
    app: system-postgresql
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zync-postgresql
  namespace: 3scale-system
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
    app: zync-postgresql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zync-postgresql
  template:
    metadata:
      labels:
        app: zync-postgresql
    spec:
      containers:
        - name: postgresql
          image: registry.redhat.io/rhel8/postgresql-15:latest
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRESQL_USER
              value: "zync"
            - name: POSTGRESQL_PASSWORD
              value: "zync3scale"
            - name: POSTGRESQL_DATABASE
              value: "zync_production"
          volumeMounts:
            - name: data
              mountPath: /var/lib/pgsql/data
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: zync-postgresql
  namespace: 3scale-system
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  selector:
    app: zync-postgresql
  ports:
    - port: 5432
      targetPort: 5432
---
# Secrets expected by 3scale 2.16 operator
apiVersion: v1
kind: Secret
metadata:
  name: backend-redis
  namespace: 3scale-system
  annotations:
    argocd.argoproj.io/sync-wave: "2"
type: Opaque
stringData:
  REDIS_STORAGE_URL: "redis://:backendredis123@backend-redis.3scale-system.svc.cluster.local:6379/0"
  REDIS_QUEUES_URL: "redis://:backendredis123@backend-redis.3scale-system.svc.cluster.local:6379/1"
---
apiVersion: v1
kind: Secret
metadata:
  name: system-redis
  namespace: 3scale-system
  annotations:
    argocd.argoproj.io/sync-wave: "2"
type: Opaque
stringData:
  URL: "redis://:systemredis123@system-redis.3scale-system.svc.cluster.local:6379/0"
  MESSAGE_BUS_URL: "redis://:systemredis123@system-redis.3scale-system.svc.cluster.local:6379/1"
---
apiVersion: v1
kind: Secret
metadata:
  name: system-database
  namespace: 3scale-system
  annotations:
    argocd.argoproj.io/sync-wave: "2"
type: Opaque
stringData:
  URL: "postgresql://system:system3scale@system-postgresql.3scale-system.svc.cluster.local:5432/system"
  DB_USER: "system"
  DB_PASSWORD: "system3scale"
---
apiVersion: v1
kind: Secret
metadata:
  name: zync
  namespace: 3scale-system
  annotations:
    argocd.argoproj.io/sync-wave: "2"
type: Opaque
stringData:
  DATABASE_URL: "postgresql://zync:zync3scale@zync-postgresql.3scale-system.svc.cluster.local:5432/zync_production"
  ZYNC_DATABASE_PASSWORD: "zync3scale"
---
# ============================================================
# APIManager — 3scale 2.16 (external databases)
# ============================================================
apiVersion: apps.3scale.net/v1alpha1
kind: APIManager
metadata:
  name: 3scale
  namespace: 3scale-system
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  wildcardDomain: {{ .Values.wildcardDomain }}
  resourceRequirementsEnabled: false
  externalComponents:
    system:
      database: true
      redis: true
    backend:
      redis: true
    zync:
      database: true
  system:
    fileStorage:
      persistentVolumeClaim:
        storageClassName: "ocs-external-storagecluster-cephfs"
  zync:
    appSpec:
      replicas: 1
    queSpec:
      replicas: 1
  backend:
    listenerSpec:
      replicas: 1
    workerSpec:
      replicas: 1
    cronSpec:
      replicas: 1
  apicast:
    stagingSpec:
      replicas: 1
    productionSpec:
      replicas: 1
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: 3scale-token-sync
  namespace: 3scale-system
  annotations:
    argocd.argoproj.io/sync-wave: "4"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: 3scale-token-sync
  annotations:
    argocd.argoproj.io/sync-wave: "4"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "create", "patch", "update"]
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: 3scale-token-sync
  annotations:
    argocd.argoproj.io/sync-wave: "4"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: 3scale-token-sync
subjects:
  - kind: ServiceAccount
    name: 3scale-token-sync
    namespace: 3scale-system
---
apiVersion: batch/v1
kind: Job
metadata:
  name: 3scale-token-sync-{{ now | date "20060102150405" }}
  namespace: 3scale-system
  annotations:
    argocd.argoproj.io/sync-wave: "5"
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 20
  activeDeadlineSeconds: 900
  template:
    spec:
      serviceAccountName: 3scale-token-sync
      restartPolicy: OnFailure
      containers:
        - name: sync
          image: registry.redhat.io/openshift4/ose-cli:latest
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              echo "Waiting for 3scale system-seed secret..."
              for i in $(seq 1 60); do
                if oc get secret system-seed -n 3scale-system >/dev/null 2>&1; then
                  echo "system-seed found after ${i} attempts"
                  break
                fi
                echo "Attempt ${i}/60 — waiting 15s..."
                sleep 15
              done
              TOKEN=$(oc get secret system-seed -n 3scale-system \
                -o jsonpath='{.data.ADMIN_ACCESS_TOKEN}' | base64 -d)
              if [ -z "$TOKEN" ]; then
                echo "ERROR: ADMIN_ACCESS_TOKEN is empty"
                exit 1
              fi
              echo "Token extracted (length=${#TOKEN})"
              oc create namespace gateforge --dry-run=client -o yaml | oc apply -f -
              if oc get secret gateforge-config -n gateforge >/dev/null 2>&1; then
                echo "Patching existing gateforge-config secret..."
                oc patch secret gateforge-config -n gateforge \
                  -p "{\"stringData\":{\"THREESCALE_ACCESS_TOKEN\":\"${TOKEN}\"}}"
              else
                echo "Creating gateforge-config secret..."
                oc create secret generic gateforge-config -n gateforge \
                  --from-literal=THREESCALE_ACCESS_TOKEN="${TOKEN}" \
                  --from-literal=AI_API_KEY=""
              fi
              echo "3scale admin token synced to gateforge namespace"
