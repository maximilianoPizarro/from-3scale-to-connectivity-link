apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: gitea
  namespace: gitea
spec:
  host: gitea-gitea.{{ .Values.clusterDomain }}
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  to:
    kind: Service
    name: gitea-http
    weight: 100
  wildcardPolicy: None
---
apiVersion: batch/v1
kind: Job
metadata:
  name: gitea-admin-setup
  namespace: gitea
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  template:
    spec:
      restartPolicy: Never
      serviceAccountName: default
      containers:
        - name: setup
          image: curlimages/curl:latest
          env:
            - name: ADMIN_USER
              value: {{ .Values.adminUser | quote }}
            - name: ADMIN_PASS
              value: {{ .Values.adminPassword | quote }}
            - name: ADMIN_EMAIL
              value: {{ .Values.adminEmail | quote }}
          command:
            - /bin/sh
            - -c
            - |
              set -e
              BASE="http://gitea-http.gitea.svc.cluster.local:3000"
              until curl -sf "$BASE/api/v1/version"; do
                sleep 3
              done
              USER_JSON=$(printf '%s' "{\"username\":\"${ADMIN_USER}\",\"password\":\"${ADMIN_PASS}\",\"email\":\"${ADMIN_EMAIL}\",\"must_change_password\":false,\"send_notify\":false}")
              CODE=$(curl -sS -o /tmp/user_resp -w "%{http_code}" -X POST "$BASE/api/v1/admin/users" \
                -H "Content-Type: application/json" \
                -d "$USER_JSON" || true)
              if [ "$CODE" != "201" ] && [ "$CODE" != "422" ]; then
                echo "admin user create failed: HTTP $CODE" >&2
                cat /tmp/user_resp >&2 || true
                exit 1
              fi
              ORG_JSON='{"username":"developer-hub","full_name":"Developer Hub"}'
              CODE2=$(curl -sS -o /tmp/org_resp -w "%{http_code}" -X POST "$BASE/api/v1/orgs" \
                -u "${ADMIN_USER}:${ADMIN_PASS}" \
                -H "Content-Type: application/json" \
                -d "$ORG_JSON" || true)
              if [ "$CODE2" != "201" ] && [ "$CODE2" != "422" ]; then
                echo "org create failed: HTTP $CODE2" >&2
                cat /tmp/org_resp >&2 || true
                exit 1
              fi
              echo "Creating {{ .Values.userCount | default 200 }} users and orgs..."
              for i in $(seq 1 {{ .Values.userCount | default 200 }}); do
                U="user${i}"
                ORG="ws-${U}"
                U_JSON=$(printf '{"username":"%s","password":"Welcome123!","email":"%s@developer-hub.local","must_change_password":false,"send_notify":false}' "$U" "$U")
                C=$(curl -sS -o /dev/null -w "%{http_code}" -X POST "$BASE/api/v1/admin/users" \
                  -u "${ADMIN_USER}:${ADMIN_PASS}" \
                  -H "Content-Type: application/json" \
                  -d "$U_JSON" || true)
                O_JSON=$(printf '{"username":"%s","visibility":"public","description":"Workshop repos for %s"}' "$ORG" "$U")
                O=$(curl -sS -o /dev/null -w "%{http_code}" -X POST "$BASE/api/v1/orgs" \
                  -u "${ADMIN_USER}:${ADMIN_PASS}" \
                  -H "Content-Type: application/json" \
                  -d "$O_JSON" || true)
                TID=$(curl -sS -u "${ADMIN_USER}:${ADMIN_PASS}" "$BASE/api/v1/orgs/${ORG}/teams" 2>/dev/null \
                  | sed -n 's/.*"id":\([0-9]*\).*"name":"Owners".*/\1/p')
                if [ -n "$TID" ]; then
                  curl -sS -o /dev/null -X PUT "$BASE/api/v1/teams/${TID}/members/${U}" \
                    -u "${ADMIN_USER}:${ADMIN_PASS}" || true
                fi
                echo "${U}: user=${C} org=${O}"
              done
              echo "All users and orgs created."
  backoffLimit: 3
