apiVersion: v1
kind: Namespace
metadata:
  name: microcks
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    kubernetes.io/metadata.name: microcks
---
# Quarkus Microcks Operator (replaces decommissioned Ansible/OLM MicrocksInstall).
# Operator Deployment/RBAC comes from helmApps.microcks-operator.
apiVersion: microcks.io/v1alpha1
kind: Microcks
metadata:
  name: microcks
  namespace: microcks
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  version: "1.14.0"
  microcks:
    url: "microcks.{{ .Values.clusterDomain }}"
  keycloak:
    install: true
    url: "microcks-keycloak.{{ .Values.clusterDomain }}"
    privateUrl: "http://microcks-keycloak.microcks.svc.cluster.local:8080"
  mongodb:
    install: true
    persistent: true
    volumeSize: 2Gi
---
apiVersion: console.openshift.io/v1
kind: ConsoleLink
metadata:
  name: microcks-console-link
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  href: https://microcks.{{ .Values.clusterDomain }}
  location: ApplicationMenu
  applicationMenu:
    section: API Management
    imageURL: data:image/svg+xml;base64,
  text: "Microcks"
