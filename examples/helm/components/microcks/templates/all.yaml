apiVersion: v1
kind: Namespace
metadata:
  name: microcks
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    kubernetes.io/metadata.name: microcks
---
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: microcks-og
  namespace: microcks
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  targetNamespaces:
    - microcks
---
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: microcks
  namespace: microcks
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  channel: stable
  installPlanApproval: Automatic
  name: microcks
  source: community-operators
  sourceNamespace: openshift-marketplace
---
apiVersion: microcks.github.io/v1alpha1
kind: MicrocksInstall
metadata:
  name: microcks
  namespace: microcks
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  name: microcks
  version: "1.10.0"
  microcks:
    replicas: 1
    url: microcks.{{ .Values.clusterDomain }}
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi
  postman:
    replicas: 1
  keycloak:
    install: true
    persistent: true
    url: microcks-keycloak.{{ .Values.clusterDomain }}
    volumeSize: 1Gi
  mongodb:
    install: true
    persistent: true
    volumeSize: 2Gi
---
apiVersion: console.openshift.io/v1
kind: ConsoleLink
metadata:
  name: microcks-console-link
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  href: https://microcks.{{ .Values.clusterDomain }}
  location: ApplicationMenu
  applicationMenu:
    section: API Management
    imageURL: data:image/svg+xml;base64,
  text: "Microcks"
