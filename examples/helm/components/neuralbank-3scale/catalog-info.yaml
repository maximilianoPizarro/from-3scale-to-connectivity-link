apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: neuralbank-3scale-system
  description: "Neuralbank stack secured with Red Hat 3scale API Management (OIDC)"
  annotations:
    backstage.io/techdocs-ref: dir:.
  tags:
    - 3scale
    - oidc
    - neuralbank
    - migration-source
spec:
  owner: platform-engineering
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: neuralbank-3scale-backend
  description: "Neuralbank Backend API — secured via 3scale OIDC Product"
  annotations:
    backstage.io/kubernetes-id: neuralbank-3scale-backend
  tags:
    - java
    - quarkus
    - 3scale
    - oidc
spec:
  type: service
  lifecycle: production
  owner: platform-engineering
  system: neuralbank-3scale-system
  providesApis:
    - neuralbank-3scale-api
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: neuralbank-3scale-frontend
  description: "Neuralbank Frontend — SPA behind 3scale OIDC"
  annotations:
    backstage.io/kubernetes-id: neuralbank-3scale-frontend
  tags:
    - frontend
    - html
    - 3scale
spec:
  type: website
  lifecycle: production
  owner: platform-engineering
  system: neuralbank-3scale-system
---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: neuralbank-3scale-api
  description: "Neuralbank Credit Management API — 3scale OIDC"
  tags:
    - rest
    - 3scale
    - oidc
spec:
  type: openapi
  lifecycle: production
  owner: platform-engineering
  system: neuralbank-3scale-system
  definition: |
    openapi: "3.0.3"
    info:
      title: "Neuralbank Credit Management API (3scale)"
      version: "1.0.0"
      description: "API REST secured by Red Hat 3scale with OIDC authentication via Keycloak"
    paths:
      /api/v1/customers:
        get:
          summary: List all customers
          security:
            - oidc: []
        post:
          summary: Create a new customer
          security:
            - oidc: []
      /api/v1/customers/{id}:
        get:
          summary: Get customer by ID
          security:
            - oidc: []
    components:
      securitySchemes:
        oidc:
          type: openIdConnect
          openIdConnectUrl: "https://rhbk.apps.cluster.example.com/realms/neuralbank/.well-known/openid-configuration"
