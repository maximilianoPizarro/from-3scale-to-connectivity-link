apiVersion: v1
kind: Namespace
metadata:
  name: neuralbank-3scale
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    kubernetes.io/metadata.name: neuralbank-3scale
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: neuralbank-3scale-argocd-role
  namespace: neuralbank-3scale
  annotations:
    argocd.argoproj.io/sync-wave: "1"
rules:
  - apiGroups: ["", "apps", "route.openshift.io"]
    resources: ["*"]
    verbs: ["*"]
  - apiGroups: ["capabilities.3scale.net"]
    resources: ["*"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: neuralbank-3scale-argocd-binding
  namespace: neuralbank-3scale
  annotations:
    argocd.argoproj.io/sync-wave: "1"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: neuralbank-3scale-argocd-role
subjects:
  - kind: ServiceAccount
    name: openshift-gitops-argocd-application-controller
    namespace: openshift-gitops
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: anyuid-default-neuralbank-3scale
  namespace: neuralbank-3scale
  annotations:
    argocd.argoproj.io/sync-wave: "1"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:anyuid
subjects:
  - kind: ServiceAccount
    name: default
    namespace: neuralbank-3scale
---
apiVersion: capabilities.3scale.net/v1beta1
kind: Backend
metadata:
  name: neuralbank-accounts-backend
  namespace: 3scale-system
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  name: "Neuralbank Accounts Backend"
  systemName: neuralbank-accounts-backend
  privateBaseURL: "http://neuralbank-backend.neuralbank-stack.svc.cluster.local:8080"
  mappingRules:
    - httpMethod: GET
      pattern: "/api/v1/customers$"
      metricMethodRef: hits
      increment: 1
    - httpMethod: GET
      pattern: "/api/v1/customers/{id}$"
      metricMethodRef: hits
      increment: 1
    - httpMethod: POST
      pattern: "/api/v1/customers$"
      metricMethodRef: hits
      increment: 1
    - httpMethod: PUT
      pattern: "/api/v1/customers/{id}$"
      metricMethodRef: hits
      increment: 1
    - httpMethod: DELETE
      pattern: "/api/v1/customers/{id}$"
      metricMethodRef: hits
      increment: 1
    - httpMethod: GET
      pattern: "/api/v1/customers/{id}/accounts$"
      metricMethodRef: hits
      increment: 1
    - httpMethod: POST
      pattern: "/api/v1/accounts$"
      metricMethodRef: hits
      increment: 1
    - httpMethod: GET
      pattern: "/api/v1/accounts/{id}$"
      metricMethodRef: hits
      increment: 1
    - httpMethod: GET
      pattern: "/api/v1/accounts/{id}/balance$"
      metricMethodRef: hits
      increment: 1
    - httpMethod: GET
      pattern: "/q/openapi$"
      metricMethodRef: hits
      increment: 1
    - httpMethod: GET
      pattern: "/q/swagger-ui"
      metricMethodRef: hits
      increment: 1
    - httpMethod: GET
      pattern: "/q/health$"
      metricMethodRef: hits
      increment: 1
  metrics:
    hits:
      friendlyName: Hits
      unit: hit
      description: Number of API hits
---
apiVersion: capabilities.3scale.net/v1beta1
kind: Backend
metadata:
  name: neuralbank-transactions-backend
  namespace: 3scale-system
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  name: "Neuralbank Transactions Backend"
  systemName: neuralbank-transactions-backend
  privateBaseURL: "http://neuralbank-backend.neuralbank-stack.svc.cluster.local:8080"
  mappingRules:
    - httpMethod: GET
      pattern: "/api/v1/accounts/{id}/transactions$"
      metricMethodRef: hits
      increment: 1
    - httpMethod: POST
      pattern: "/api/v1/transactions$"
      metricMethodRef: transactions
      increment: 1
    - httpMethod: GET
      pattern: "/api/v1/transactions/{id}$"
      metricMethodRef: transactions
      increment: 1
    - httpMethod: POST
      pattern: "/api/v1/transfers$"
      metricMethodRef: transactions
      increment: 1
    - httpMethod: GET
      pattern: "/api/v1/transfers/{id}/status$"
      metricMethodRef: hits
      increment: 1
  metrics:
    hits:
      friendlyName: Hits
      unit: hit
      description: Number of API hits
    transactions:
      friendlyName: Transactions
      unit: transaction
      description: Financial transaction operations
---
apiVersion: capabilities.3scale.net/v1beta1
kind: Backend
metadata:
  name: neuralbank-lending-backend
  namespace: 3scale-system
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  name: "Neuralbank Lending Backend"
  systemName: neuralbank-lending-backend
  privateBaseURL: "http://neuralbank-backend.neuralbank-stack.svc.cluster.local:8080"
  mappingRules:
    - httpMethod: GET
      pattern: "/api/v1/customers/{id}/credit-score$"
      metricMethodRef: credit_checks
      increment: 1
    - httpMethod: POST
      pattern: "/api/v1/loans/applications$"
      metricMethodRef: credit_checks
      increment: 1
    - httpMethod: GET
      pattern: "/api/v1/loans/{id}$"
      metricMethodRef: hits
      increment: 1
    - httpMethod: GET
      pattern: "/api/v1/loans/{id}/schedule$"
      metricMethodRef: hits
      increment: 1
    - httpMethod: GET
      pattern: "/api/v1/statements/{accountId}$"
      metricMethodRef: hits
      increment: 1
    - httpMethod: GET
      pattern: "/api/v1/statements/{accountId}/pdf$"
      metricMethodRef: hits
      increment: 1
  metrics:
    hits:
      friendlyName: Hits
      unit: hit
      description: Number of API hits
    credit_checks:
      friendlyName: Credit Checks
      unit: check
      description: Credit scoring and loan operations
---
apiVersion: capabilities.3scale.net/v1beta1
kind: Product
metadata:
  name: neuralbank-oidc-product
  namespace: 3scale-system
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  name: "Neuralbank API (OIDC)"
  systemName: neuralbank-oidc
  backendUsages:
    neuralbank-accounts-backend:
      path: /api/v1/customers
    neuralbank-transactions-backend:
      path: /api/v1/transactions
    neuralbank-lending-backend:
      path: /api/v1/loans
  deployment:
    apicastHosted:
      authentication:
        oidc:
          issuerType: keycloak
          issuerEndpoint: "https://rhbk.{{ .Values.clusterDomain }}/realms/neuralbank"
          jwtClaimWithClientID: azp
          jwtClaimWithClientIDType: plain
          authenticationFlow:
            standardFlowEnabled: true
            implicitFlowEnabled: false
            serviceAccountsEnabled: true
            directAccessGrantsEnabled: true
  applicationPlans:
    basic:
      name: "Basic Plan"
      limits:
        - period: minute
          value: 60
          metricMethodRef:
            systemName: hits
    premium:
      name: "Premium Plan"
      limits:
        - period: minute
          value: 300
          metricMethodRef:
            systemName: hits
---
apiVersion: capabilities.3scale.net/v1beta1
kind: ActiveDoc
metadata:
  name: neuralbank-activedoc
  namespace: 3scale-system
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  name: "Neuralbank Credit Management API"
  productSystemName: neuralbank-oidc
  activeDocOpenAPIRef:
    url: "http://neuralbank-backend-svc.neuralbank-stack.svc.cluster.local:8080/q/openapi?format=json"
  published: true
