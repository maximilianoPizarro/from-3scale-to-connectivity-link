apiVersion: v1
kind: Namespace
metadata:
  name: neuralbank-3scale
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    kubernetes.io/metadata.name: neuralbank-3scale
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: neuralbank-3scale-argocd-role
  namespace: neuralbank-3scale
  annotations:
    argocd.argoproj.io/sync-wave: "1"
rules:
  - apiGroups: ["", "apps", "route.openshift.io"]
    resources: ["*"]
    verbs: ["*"]
  - apiGroups: ["capabilities.3scale.net"]
    resources: ["*"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: neuralbank-3scale-argocd-binding
  namespace: neuralbank-3scale
  annotations:
    argocd.argoproj.io/sync-wave: "1"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: neuralbank-3scale-argocd-role
subjects:
  - kind: ServiceAccount
    name: openshift-gitops-argocd-application-controller
    namespace: openshift-gitops
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: anyuid-default-neuralbank-3scale
  namespace: neuralbank-3scale
  annotations:
    argocd.argoproj.io/sync-wave: "1"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:anyuid
subjects:
  - kind: ServiceAccount
    name: default
    namespace: neuralbank-3scale
---
apiVersion: capabilities.3scale.net/v1beta1
kind: Backend
metadata:
  name: neuralbank-backend-api
  namespace: 3scale-system
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  name: "Neuralbank Backend API"
  systemName: neuralbank-backend-api
  privateBaseURL: "http://neuralbank-backend.neuralbank-stack.svc.cluster.local:8080"
  mappingRules:
    - httpMethod: GET
      pattern: "/api/v1/customers$"
      metricMethodRef: hits
      increment: 1
    - httpMethod: GET
      pattern: "/api/v1/customers/{id}$"
      metricMethodRef: hits
      increment: 1
    - httpMethod: POST
      pattern: "/api/v1/customers$"
      metricMethodRef: hits
      increment: 1
    - httpMethod: GET
      pattern: "/q/openapi$"
      metricMethodRef: hits
      increment: 1
    - httpMethod: GET
      pattern: "/q/swagger-ui"
      metricMethodRef: hits
      increment: 1
  metrics:
    hits:
      friendlyName: Hits
      unit: hit
      description: Number of API hits
---
apiVersion: capabilities.3scale.net/v1beta1
kind: Product
metadata:
  name: neuralbank-oidc-product
  namespace: 3scale-system
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  name: "Neuralbank API (OIDC)"
  systemName: neuralbank-oidc
  backendUsages:
    neuralbank-backend-api:
      path: /
  deployment:
    apicastHosted:
      authentication:
        oidc:
          issuerType: keycloak
          issuerEndpoint: "https://rhbk.{{ .Values.clusterDomain }}/realms/neuralbank"
          jwtClaimWithClientID: azp
          jwtClaimWithClientIDType: plain
          authenticationFlow:
            standardFlowEnabled: true
            implicitFlowEnabled: false
            serviceAccountsEnabled: true
            directAccessGrantsEnabled: true
  applicationPlans:
    basic:
      name: "Basic Plan"
      limits:
        - period: minute
          value: 60
          metricMethodRef:
            systemName: hits
    premium:
      name: "Premium Plan"
      limits:
        - period: minute
          value: 300
          metricMethodRef:
            systemName: hits
---
apiVersion: capabilities.3scale.net/v1beta1
kind: ActiveDoc
metadata:
  name: neuralbank-activedoc
  namespace: 3scale-system
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  name: "Neuralbank Credit Management API"
  productSystemName: neuralbank-oidc
  activeDocOpenAPIRef:
    url: "https://neuralbank.{{ .Values.clusterDomain }}/q/openapi"
  published: true
