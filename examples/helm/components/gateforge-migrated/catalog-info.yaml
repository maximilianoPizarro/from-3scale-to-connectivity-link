apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: gateforge-migrated-apis
  namespace: default
  description: "APIs migrated from 3scale to Connectivity Link by GateForge"
  tags:
    - gateforge
    - connectivity-link
    - migration
spec:
  owner: platform-engineering
  domain: api-management

---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: account-mgmt-api
  namespace: default
  description: "Account CRUD, balance queries, statement generation and multi-currency support — migrated from 3scale to Connectivity Link by GateForge"
  annotations:
    kuadrant.io/namespace: user1-neuralbank
    kuadrant.io/apiproduct: account-mgmt-api
    kuadrant.io/httproute: account-mgmt-api-route
    backstage.io/kubernetes-namespace: user1-neuralbank
    backstage.io/kubernetes-id: account-mgmt-api
  tags:
    - connectivity-link
    - kuadrant
    - gateforge-migrated
    - gateway-api
  links:
    - title: API Gateway Endpoint
      icon: api
    - title: GateForge Dashboard
      icon: dashboard
spec:
  type: openapi
  lifecycle: production
  owner: platform-engineering
  system: gateforge-migrated-apis
  definition: |
    openapi: "3.0.3"
    info:
      title: Account Management API
      description: |
        Account CRUD, balance queries, statement generation and multi-currency support.
        Migrated from 3scale to Connectivity Link by GateForge.
        Protected by Kuadrant AuthPolicy and RateLimitPolicy.
      version: "1.0.0"
      contact:
        name: Platform Engineering
    servers:
      - url: /
        description: Resolved dynamically via Kubernetes Route
    paths:
      /:
        get:
          summary: Service info
          responses:
            '200':
              description: Service metadata
            '401':
              description: Unauthorized — Kuadrant AuthPolicy
      /api/v1/customers:
        get:
          summary: List customers
          responses:
            '200':
              description: Customer list
            '401':
              description: Unauthorized
        post:
          summary: Create customer
          responses:
            '201':
              description: Customer created
      /api/v1/customers/{id}:
        get:
          summary: Get customer by ID
          parameters:
            - name: id
              in: path
              required: true
              schema:
                type: integer
          responses:
            '200':
              description: Customer found
            '404':
              description: Not found
      /q/health:
        get:
          summary: Health check
          responses:
            '200':
              description: Healthy

