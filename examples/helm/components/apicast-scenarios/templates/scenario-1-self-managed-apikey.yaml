apiVersion: apps.3scale.net/v1alpha1
kind: APIManager
metadata:
  name: apicast-self-apikey
  namespace: apicast-scenario-1
  labels:
    gateforge.io/scenario: self-managed-apikey
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  wildcardDomain: {{ .Values.clusterDomain }}
  apicast:
    stagingSpec:
      replicas: 1
    productionSpec:
      replicas: 1
---
apiVersion: capabilities.3scale.net/v1beta1
kind: Product
metadata:
  name: account-mgmt-apikey
  namespace: apicast-scenario-1
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  name: Account Management (API Key)
  systemName: account-mgmt-apikey
  description: "Account Management API protected by API Key via self-managed APICast"
  deployment:
    apicastSelfManaged:
      authentication:
        userkey:
          authUserKey: user_key
      stagingDomain: account-mgmt-staging.{{ .Values.clusterDomain }}
      productionDomain: account-mgmt-prod.{{ .Values.clusterDomain }}
  backendUsages:
    account-mgmt-backend:
      path: /
---
apiVersion: capabilities.3scale.net/v1beta1
kind: Backend
metadata:
  name: account-mgmt-backend
  namespace: apicast-scenario-1
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  name: Account Management Backend
  systemName: account-mgmt-backend
  privateBaseURL: "{{ .Values.microcksUrl }}/rest/Account+Management+API/1.0"
