apiVersion: apps.3scale.net/v1alpha1
kind: APIManager
metadata:
  name: apicast-multi-tenant
  namespace: apicast-scenario-3
  labels:
    gateforge.io/scenario: multi-tenant
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  wildcardDomain: {{ .Values.clusterDomain }}
  apicast:
    stagingSpec:
      replicas: 1
    productionSpec:
      replicas: 2
  tenants:
    - name: tenant-cards
      adminDomain: cards-admin.{{ .Values.clusterDomain }}
      developerDomain: cards-dev.{{ .Values.clusterDomain }}
    - name: tenant-kyc
      adminDomain: kyc-admin.{{ .Values.clusterDomain }}
      developerDomain: kyc-dev.{{ .Values.clusterDomain }}
---
apiVersion: capabilities.3scale.net/v1beta1
kind: Product
metadata:
  name: card-issuing-mt
  namespace: apicast-scenario-3
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  name: Card Issuing (Multi-Tenant)
  systemName: card-issuing-mt
  description: "Card Issuing API on multi-tenant APICast - Tenant Cards"
  deployment:
    apicastSelfManaged:
      authentication:
        userkey:
          authUserKey: user_key
      stagingDomain: card-issuing-staging.{{ .Values.clusterDomain }}
      productionDomain: card-issuing-prod.{{ .Values.clusterDomain }}
  backendUsages:
    card-issuing-backend:
      path: /
---
apiVersion: capabilities.3scale.net/v1beta1
kind: Backend
metadata:
  name: card-issuing-backend
  namespace: apicast-scenario-3
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  name: Card Issuing Backend
  systemName: card-issuing-backend
  privateBaseURL: "{{ .Values.microcksUrl }}/rest/Card+Issuing+API/1.0"
---
apiVersion: capabilities.3scale.net/v1beta1
kind: Product
metadata:
  name: kyc-verification-mt
  namespace: apicast-scenario-3
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  name: KYC Verification (Multi-Tenant)
  systemName: kyc-verification-mt
  description: "KYC Verification API on multi-tenant APICast - Tenant KYC"
  deployment:
    apicastSelfManaged:
      authentication:
        userkey:
          authUserKey: user_key
      stagingDomain: kyc-staging.{{ .Values.clusterDomain }}
      productionDomain: kyc-prod.{{ .Values.clusterDomain }}
  backendUsages:
    kyc-verification-backend:
      path: /
---
apiVersion: capabilities.3scale.net/v1beta1
kind: Backend
metadata:
  name: kyc-verification-backend
  namespace: apicast-scenario-3
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  name: KYC Verification Backend
  systemName: kyc-verification-backend
  privateBaseURL: "{{ .Values.microcksUrl }}/rest/KYC+Verification+API/1.0"
