apiVersion: apps.3scale.net/v1alpha1
kind: APIManager
metadata:
  name: apicast-self-oidc
  namespace: apicast-scenario-2
  labels:
    gateforge.io/scenario: self-managed-oidc
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  wildcardDomain: {{ .Values.clusterDomain }}
  apicast:
    stagingSpec:
      replicas: 1
    productionSpec:
      replicas: 2
---
apiVersion: capabilities.3scale.net/v1beta1
kind: Product
metadata:
  name: wire-transfer-oidc
  namespace: apicast-scenario-2
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  name: Wire Transfer (OIDC)
  systemName: wire-transfer-oidc
  description: "Wire Transfer API protected by OIDC via self-managed APICast"
  deployment:
    apicastSelfManaged:
      authentication:
        oidc:
          issuerEndpoint: https://sso.{{ .Values.clusterDomain }}/realms/threescale
          issuerType: keycloak
      stagingDomain: wire-transfer-staging.{{ .Values.clusterDomain }}
      productionDomain: wire-transfer-prod.{{ .Values.clusterDomain }}
  backendUsages:
    wire-transfer-backend:
      path: /
---
apiVersion: capabilities.3scale.net/v1beta1
kind: Backend
metadata:
  name: wire-transfer-backend
  namespace: apicast-scenario-2
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  name: Wire Transfer Backend
  systemName: wire-transfer-backend
  privateBaseURL: "{{ .Values.microcksUrl }}/rest/Wire+Transfer+API/1.0"
