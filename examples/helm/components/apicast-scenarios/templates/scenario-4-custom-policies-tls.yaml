apiVersion: v1
kind: Secret
metadata:
  name: rate-limit-policy-secret
  namespace: apicast-scenario-4
  annotations:
    argocd.argoproj.io/sync-wave: "1"
type: Opaque
stringData:
  init.lua: |
    return require("rate_limit")
  rate_limit.lua: |
    local _M = {}
    function _M:access(context)
      -- GateForge demo: simple Lua rate-limit policy
      ngx.log(ngx.INFO, "Rate limit policy applied by APICast custom policy")
    end
    return _M
---
apiVersion: apps.3scale.net/v1alpha1
kind: APIManager
metadata:
  name: apicast-custom-tls
  namespace: apicast-scenario-4
  labels:
    gateforge.io/scenario: custom-policies-tls
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  wildcardDomain: {{ .Values.clusterDomain }}
  apicast:
    stagingSpec:
      replicas: 1
    productionSpec:
      replicas: 2
      resources:
        requests:
          cpu: 250m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
    customPolicies:
      - name: rate-limit
        version: "1.0"
        secretRef:
          name: rate-limit-policy-secret
    openTracing:
      enabled: true
      tracingLibrary: jaeger
    tls:
      verify: true
      verifyDepth: 3
---
apiVersion: capabilities.3scale.net/v1beta1
kind: Product
metadata:
  name: account-mgmt-tls
  namespace: apicast-scenario-4
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  name: Account Management (Custom Policies + TLS)
  systemName: account-mgmt-tls
  description: "Account Management API with custom Lua policies, TLS verification, and OpenTracing via self-managed APICast"
  deployment:
    apicastSelfManaged:
      authentication:
        userkey:
          authUserKey: user_key
      stagingDomain: account-mgmt-tls-staging.{{ .Values.clusterDomain }}
      productionDomain: account-mgmt-tls-prod.{{ .Values.clusterDomain }}
  backendUsages:
    account-mgmt-tls-backend:
      path: /
---
apiVersion: capabilities.3scale.net/v1beta1
kind: Backend
metadata:
  name: account-mgmt-tls-backend
  namespace: apicast-scenario-4
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  name: Account Management TLS Backend
  systemName: account-mgmt-tls-backend
  privateBaseURL: "{{ .Values.microcksUrl }}/rest/Account+Management+API/1.0"
