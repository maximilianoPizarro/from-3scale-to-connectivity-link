apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: remove-vm
  title: "Remove Virtual Machine (Cleanup)"
  description: >
    Removes a previously created RHEL virtual machine from the platform:
    deletes the ArgoCD Application (which cascades to all VM resources),
    deletes the Gitea repository, and unregisters from the catalog.
  tags:
    - cleanup
    - vm
    - openshift-virtualization
    - remove
spec:
  owner: platform-engineering
  type: vm
  parameters:
    - title: VM to Remove
      required:
        - vmName
        - owner
      properties:
        vmName:
          title: VM Name
          type: string
          description: "Name of the virtual machine to remove (e.g. desa-rhel)"
          pattern: "^[a-z0-9][a-z0-9-]{1,61}[a-z0-9]$"
          ui:autofocus: true
        owner:
          title: Owner (username)
          type: string
          description: "Owner of the VM (e.g. user1)"
          default: ${{ user.entity.metadata.name }}
          pattern: "^user[0-9]+$"
        namespace:
          title: VM Namespace
          type: string
          description: "Namespace where the VM is deployed (leave empty for <owner>-neuralbank)"
          default: ""

  steps:
    - id: get-config
      name: Resolve Cluster Domain
      action: http:backstage:request
      input:
        method: GET
        path: /proxy/k8s-api/api/v1/namespaces/developer-hub/configmaps/workshop-config

    - id: delete-argocd-app
      name: Delete ArgoCD Application
      action: http:backstage:request
      continueOnError: true
      input:
        method: DELETE
        path: "/proxy/k8s-api/apis/argoproj.io/v1alpha1/namespaces/openshift-gitops/applications/${{ parameters.owner }}-${{ parameters.vmName }}-vm"
        headers:
          Content-Type: application/json

    - id: delete-gitea-repo
      name: Delete Gitea Repository
      action: http:backstage:request
      continueOnError: true
      input:
        method: DELETE
        path: "/proxy/gitea/repos/ws-${{ parameters.owner }}/${{ parameters.vmName }}-vm"
        headers:
          Content-Type: application/json

    - id: fetch-entity
      name: Fetch Catalog Entity
      action: http:backstage:request
      continueOnError: true
      input:
        method: GET
        path: "/catalog/entities/by-name/component/default/${{ parameters.owner }}-${{ parameters.vmName }}"

    - id: delete-entity
      name: Unregister from Catalog
      action: http:backstage:request
      continueOnError: true
      input:
        method: DELETE
        path: "/catalog/entities/by-uid/${{ steps['fetch-entity'].output.body.metadata.uid }}"

    - id: notify
      name: Send Notification
      action: http:backstage:request
      input:
        method: POST
        path: /proxy/mailpit/api/v1/send
        headers:
          Content-Type: application/json
        body:
          From:
            Email: "developer-hub@redhat.local"
            Name: "Red Hat Developer Hub"
          To:
            - Email: "${{ parameters.owner }}@redhat.local"
              Name: "${{ parameters.owner }}"
          Subject: "VM Decommissioned — ${{ parameters.vmName }}"
          Text: "Virtual machine '${{ parameters.vmName }}' has been decommissioned. ArgoCD Application deleted (VM, DataVolume, Services, Gateway, Policies cascade-deleted). Gitea repository removed. Catalog entity unregistered."
          HTML: "<div style='font-family:Red Hat Text,Helvetica,Arial,sans-serif;max-width:600px;margin:0 auto;border:1px solid #e0e0e0;border-radius:8px;overflow:hidden'><div style='background:#6a6e73;padding:24px 32px;text-align:center'><h1 style='color:#fff;margin:0;font-size:22px'>VM Decommissioned</h1><p style='color:#d2d2d2;margin:4px 0 0;font-size:12px'>OpenShift Virtualization</p></div><div style='padding:32px'><h2 style='color:#151515;margin:0 0 16px;font-size:18px'>${{ parameters.vmName }}</h2><table style='width:100%;border-collapse:collapse;font-size:14px;margin-bottom:24px'><tr style='border-bottom:1px solid #f0f0f0'><td style='padding:10px 0;color:#6a6e73;width:160px'>VM Name</td><td style='padding:10px 0;color:#151515;font-weight:500'>${{ parameters.vmName }}</td></tr><tr style='border-bottom:1px solid #f0f0f0'><td style='padding:10px 0;color:#6a6e73'>Namespace</td><td style='padding:10px 0;color:#151515;font-weight:500'>${{ parameters.namespace if parameters.namespace else parameters.owner + \"-neuralbank\" }}</td></tr><tr><td style='padding:10px 0;color:#6a6e73'>Owner</td><td style='padding:10px 0;color:#151515;font-weight:500'>${{ parameters.owner }}</td></tr></table><h3 style='color:#151515;font-size:14px;margin:0 0 12px'>Actions Completed</h3><table style='width:100%;border-collapse:collapse;font-size:13px;margin-bottom:24px'><tr style='border-bottom:1px solid #f0f0f0'><td style='padding:8px 0;color:#6a6e73;width:24px'>1.</td><td style='padding:8px 0;color:#151515'>ArgoCD Application deleted (cascade)</td><td style='padding:8px 0;text-align:right'><span style='background:#e7f1e8;color:#3e8635;padding:2px 8px;border-radius:12px;font-size:11px'>Done</span></td></tr><tr style='border-bottom:1px solid #f0f0f0'><td style='padding:8px 0;color:#6a6e73'>2.</td><td style='padding:8px 0;color:#151515'>Gitea repository deleted</td><td style='padding:8px 0;text-align:right'><span style='background:#e7f1e8;color:#3e8635;padding:2px 8px;border-radius:12px;font-size:11px'>Done</span></td></tr><tr><td style='padding:8px 0;color:#6a6e73'>3.</td><td style='padding:8px 0;color:#151515'>Catalog entity unregistered</td><td style='padding:8px 0;text-align:right'><span style='background:#e7f1e8;color:#3e8635;padding:2px 8px;border-radius:12px;font-size:11px'>Done</span></td></tr></table></div><div style='background:#f0f0f0;padding:16px 32px;text-align:center;font-size:11px;color:#6a6e73'>Powered by Red Hat Developer Hub &bull; OpenShift Virtualization</div></div>"

  output:
    text:
      - title: VM Removed
        content: |
          Virtual machine **${{ parameters.vmName }}** has been removed:
          1. ArgoCD Application `${{ parameters.owner }}-${{ parameters.vmName }}-vm` deleted (cascades to VM, DataVolume, Services, Gateway, Policies)
          2. Gitea repository `ws-${{ parameters.owner }}/${{ parameters.vmName }}-vm` deleted
          3. Backstage Catalog entity unregistered
          4. Notification sent
