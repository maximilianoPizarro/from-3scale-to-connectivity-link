apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: static-frontend-app
  title: Static Frontend Application
  description: Create a static HTML/CSS/JS landing page with OpenShift Commons theme, Tekton CI/CD pipeline, and DevSpaces support.
  tags:
    - frontend
    - html
    - openshift-commons
    - recommended
spec:
  owner: platform-engineering
  type: website
  parameters:
    - title: Application Info
      required:
        - name
        - owner
      properties:
        name:
          title: Application Name
          type: string
          description: Unique name for the application
          pattern: "^[a-z0-9-]+$"
          ui:autofocus: true
        description:
          title: Description
          type: string
          description: What is this landing page about?
          default: "A landing page built with OpenShift Commons theme"
        owner:
          title: Owner
          type: string
          description: Your username (e.g. user1)
          pattern: "^user[0-9]+$"
  steps:
    - id: fetch-skeleton
      name: Fetch Skeleton
      action: fetch:template
      input:
        url: ./skeleton
        values:
          name: ${{ parameters.name }}
          owner: ${{ parameters.owner }}
          description: ${{ parameters.description }}
          namespace: "${{ parameters.owner }}-devspaces"
          imageRegistry: "image-registry.openshift-image-registry.svc:5000"
    - id: publish
      name: Publish to Gitea
      action: publish:gitea
      input:
        repoUrl: "gitea.gitea.svc.cluster.local:3000?owner=developer-hub&repo=${{ parameters.name }}"
        description: ${{ parameters.description }}
        defaultBranch: main
        repoVisibility: public
    - id: create-argocd-app
      name: Create ArgoCD Application
      action: argocd:create-resources
      input:
        appName: ${{ parameters.name }}
        argoInstance: openshift-gitops
        namespace: "${{ parameters.owner }}-devspaces"
        repoUrl: "http://gitea.gitea.svc.cluster.local:3000/developer-hub/${{ parameters.name }}.git"
        path: manifests
    - id: register
      name: Register in Catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['publish'].output.repoContentsUrl }}
        catalogInfoPath: /catalog-info.yaml
  output:
    links:
      - title: Repository
        url: ${{ steps['publish'].output.remoteUrl }}
      - title: Open in Catalog
        icon: catalog
        entityRef: ${{ steps['register'].output.entityRef }}
