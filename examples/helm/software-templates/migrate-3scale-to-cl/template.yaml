apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: migrate-3scale-to-connectivity-link
  title: "Migrate from 3scale to Connectivity Link"
  description: >
    Generic migration template that takes any application currently secured by
    Red Hat 3scale API Management and creates the equivalent Connectivity Link
    (Kuadrant) resources in a target namespace. Supports both OIDC and API Key
    authentication models. Creates Gateway, HTTPRoute, AuthPolicy,
    RateLimitPolicy, PlanPolicy, APIProduct, and OpenShift Route — deployed
    via ArgoCD GitOps.
  tags:
    - migration
    - 3scale
    - connectivity-link
    - kuadrant
    - gateway-api
    - recommended
spec:
  owner: platform-engineering
  type: service

  parameters:
    - title: Application Details
      required:
        - appName
        - owner
        - authModel
      properties:
        appName:
          title: Application Name
          type: string
          description: "Name of the application to migrate (e.g. neuralbank-backend, nfl-wallet-api)"
          pattern: "^[a-z0-9-]+$"
          ui:autofocus: true
        description:
          title: Description
          type: string
          description: "Brief description of the migrated service"
          default: "Service migrated from 3scale to Connectivity Link"
        owner:
          title: Owner (username)
          type: string
          description: "Your workshop username (e.g. user1)"
          default: ${{ user.entity.metadata.name }}
          pattern: "^user[0-9]+$"
        authModel:
          title: Authentication Model
          type: string
          description: "Authentication model used in 3scale"
          enum:
            - oidc
            - apikey
          enumNames:
            - "OIDC (OpenID Connect via Keycloak)"
            - "API Key (X-API-Key header)"
          default: oidc

    - title: Source & Target Configuration
      required:
        - sourceNamespace
        - targetNamespace
        - backendServiceName
      properties:
        sourceNamespace:
          title: Source Namespace (3scale)
          type: string
          description: "Namespace where the app is currently deployed with 3scale"
          pattern: "^[a-z0-9-]+$"
        targetNamespace:
          title: Target Namespace (Connectivity Link)
          type: string
          description: "Namespace where Connectivity Link resources will be created"
          pattern: "^[a-z0-9-]+$"
        backendServiceName:
          title: Backend Service Name
          type: string
          description: "Name of the Kubernetes Service to route traffic to"
          pattern: "^[a-z0-9-]+$"
        backendServicePort:
          title: Backend Service Port
          type: integer
          description: "Port of the backend service"
          default: 8080

    - title: Authentication & Rate Limiting
      properties:
        keycloakRealm:
          title: Keycloak Realm
          type: string
          description: "Keycloak realm name (only for OIDC)"
          default: "neuralbank"
        keycloakClientId:
          title: Keycloak Client ID
          type: string
          description: "OIDC client ID in Keycloak (only for OIDC)"
          default: "neuralbank-frontend"
        rateLimitPerMinute:
          title: Rate Limit (requests/minute)
          type: integer
          description: "Maximum requests per minute per client"
          default: 60
        clusterDomain:
          title: Cluster Domain
          type: string
          ui:widget: hidden
          default: "apps.cluster.example.com"

  steps:
    - id: fetch-skeleton
      name: Generate Connectivity Link manifests
      action: fetch:template
      input:
        url: ./skeleton
        targetPath: .
        values:
          name: ${{ parameters.appName }}
          uniqueName: "${{ parameters.owner }}-${{ parameters.appName }}"
          description: ${{ parameters.description }}
          owner: ${{ parameters.owner }}
          namespace: ${{ parameters.targetNamespace }}
          sourceNamespace: ${{ parameters.sourceNamespace }}
          authModel: ${{ parameters.authModel }}
          backendServiceName: ${{ parameters.backendServiceName }}
          backendServicePort: ${{ parameters.backendServicePort }}
          keycloakRealm: ${{ parameters.keycloakRealm }}
          keycloakClientId: ${{ parameters.keycloakClientId }}
          rateLimitPerMinute: ${{ parameters.rateLimitPerMinute }}
          clusterDomain: ${{ parameters.clusterDomain }}

    - id: publish
      name: Push to Gitea
      action: publish:gitea
      input:
        repoUrl: "gitea-gitea.${{ parameters.clusterDomain }}?owner=ws-${{ parameters.owner }}&repo=${{ parameters.appName }}-cl-migration"
        description: "Migration from 3scale to Connectivity Link: ${{ parameters.appName }}"
        defaultBranch: main
        repoVisibility: public

    - id: register
      name: Register in Developer Hub Catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['publish'].output.repoContentsUrl }}
        catalogInfoPath: "/catalog-info.yaml"

    - id: create-argocd-app
      name: Create ArgoCD Application
      action: http:backstage:request
      input:
        method: POST
        path: /proxy/k8s-api/apis/argoproj.io/v1alpha1/namespaces/openshift-gitops/applications
        headers:
          Content-Type: application/json
        body:
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: "${{ parameters.owner }}-${{ parameters.appName }}-cl-migration"
            namespace: openshift-gitops
            labels:
              demo.redhat.com/application: "field-content"
            finalizers:
              - resources-finalizer.argocd.argoproj.io
          spec:
            project: default
            source:
              repoURL: "${{ steps['publish'].output.remoteUrl }}"
              targetRevision: main
              path: manifests
            destination:
              server: https://kubernetes.default.svc
              namespace: ${{ parameters.targetNamespace }}
            syncPolicy:
              automated:
                prune: true
                selfHeal: true
              syncOptions:
                - CreateNamespace=true
                - ServerSideApply=true
                - SkipDryRunOnMissingResource=true

    - id: notify
      name: Send Migration Notification
      action: http:backstage:request
      input:
        method: POST
        path: /proxy/mailpit/api/v1/send
        headers:
          Content-Type: application/json
        body:
          From:
            Email: "developer-hub@redhat.local"
            Name: "Red Hat Developer Hub"
          To:
            - Email: "${{ parameters.owner }}@redhat.local"
              Name: "${{ parameters.owner }}"
          Subject: "Migration Complete — ${{ parameters.appName }} from 3scale to Connectivity Link"
          Text: "Migration of ${{ parameters.appName }} from 3scale (namespace ${{ parameters.sourceNamespace }}) to Connectivity Link (namespace ${{ parameters.targetNamespace }}) has been initiated. Auth model: ${{ parameters.authModel }}. ArgoCD will sync the resources automatically."
          HTML: "<div style='font-family:Red Hat Text,Helvetica,Arial,sans-serif;max-width:600px;margin:0 auto;border:1px solid #e0e0e0;border-radius:8px;overflow:hidden'><div style='background:#0066CC;padding:24px 32px;text-align:center'><h1 style='color:#fff;margin:0;font-size:22px'>Migration Complete</h1><p style='color:#d2d2d2;margin:4px 0 0;font-size:12px'>3scale → Connectivity Link</p></div><div style='padding:32px'><h2 style='color:#151515;margin:0 0 16px;font-size:18px'>${{ parameters.appName }}</h2><table style='width:100%;border-collapse:collapse;font-size:14px;margin-bottom:24px'><tr style='border-bottom:1px solid #f0f0f0'><td style='padding:10px 0;color:#6a6e73;width:160px'>Source (3scale)</td><td style='padding:10px 0;color:#151515;font-weight:500'>${{ parameters.sourceNamespace }}</td></tr><tr style='border-bottom:1px solid #f0f0f0'><td style='padding:10px 0;color:#6a6e73'>Target (CL)</td><td style='padding:10px 0;color:#151515;font-weight:500'>${{ parameters.targetNamespace }}</td></tr><tr style='border-bottom:1px solid #f0f0f0'><td style='padding:10px 0;color:#6a6e73'>Auth Model</td><td style='padding:10px 0;color:#151515;font-weight:500'>${{ parameters.authModel }}</td></tr><tr><td style='padding:10px 0;color:#6a6e73'>Rate Limit</td><td style='padding:10px 0;color:#151515;font-weight:500'>${{ parameters.rateLimitPerMinute }} req/min</td></tr></table></div><div style='background:#f0f0f0;padding:16px 32px;text-align:center;font-size:11px;color:#6a6e73'>Powered by Red Hat Developer Hub &bull; Kuadrant</div></div>"

  output:
    links:
      - title: Repository
        url: ${{ steps['publish'].output.remoteUrl }}
      - title: Open in catalog
        icon: catalog
        entityRef: ${{ steps['register'].output.entityRef }}
    text:
      - title: Migration Initiated
        content: |
          **${{ parameters.appName }}** migration from 3scale to Connectivity Link:
          - Source: `${{ parameters.sourceNamespace }}` (3scale)
          - Target: `${{ parameters.targetNamespace }}` (Connectivity Link)
          - Auth: `${{ parameters.authModel }}`
          - ArgoCD will sync the Kuadrant resources automatically
