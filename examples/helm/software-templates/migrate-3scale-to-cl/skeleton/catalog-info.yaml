apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: ${{values.uniqueName}}-cl-migration
  description: "${{values.description}} — Migrated from 3scale to Connectivity Link"
  annotations:
    backstage.io/kubernetes-id: ${{values.uniqueName}}
    argocd/app-name: "${{values.owner}}-${{values.name}}-cl-migration"
    backstage.io/techdocs-ref: dir:.
  tags:
    - migrated
    - connectivity-link
    - ${{values.authModel}}
    - kuadrant
spec:
  type: service
  lifecycle: production
  owner: ${{values.owner}}
  providesApis:
    - ${{values.uniqueName}}-cl-api
---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: ${{values.uniqueName}}-cl-api
  description: "${{values.name}} API — Connectivity Link (${{values.authModel}})"
  tags:
    - rest
    - connectivity-link
    - ${{values.authModel}}
spec:
  type: openapi
  lifecycle: production
  owner: ${{values.owner}}
  definition: |
    openapi: "3.0.3"
    info:
      title: "${{values.name}} API (Connectivity Link)"
      version: "1.0.0"
      description: "Migrated from 3scale. Auth: ${{values.authModel}}"
    paths:
      /api/v1/customers:
        get:
          summary: List resources
      /api/v1/customers/{id}:
        get:
          summary: Get resource by ID
