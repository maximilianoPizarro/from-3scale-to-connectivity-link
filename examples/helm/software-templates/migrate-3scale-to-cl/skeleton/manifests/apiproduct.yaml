apiVersion: devportal.kuadrant.io/v1alpha1
kind: APIProduct
metadata:
  name: ${{values.name}}-api
  namespace: ${{values.namespace}}
  labels:
    app.kubernetes.io/name: ${{values.name}}
    backstage.io/kubernetes-id: ${{values.uniqueName}}
spec:
  displayName: "${{values.name}} — Migrated from 3scale"
  description: |
    ${{values.description}}
    Migrated from Red Hat 3scale to Red Hat Connectivity Link (Kuadrant).
    Authentication: ${{values.authModel}}
  version: "v1"
  publishStatus: Published
  approvalMode: automatic
  tags:
    - migrated
    - 3scale-to-cl
    - ${{values.authModel}}
    - kuadrant
  contact:
    team: Platform Engineering
    email: platform@redhat.local
  documentation:
    openAPISpecURL: "https://${{values.name}}.${{values.clusterDomain}}/q/openapi"
    swaggerUI: "https://${{values.name}}.${{values.clusterDomain}}/q/swagger-ui"
    gitRepository: "${{ '${{' }} values.repoUrl {{ '}}' }}"
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: ${{values.name}}-route
