apiVersion: kuadrant.io/v1
kind: AuthPolicy
metadata:
  name: ${{values.name}}-auth
  namespace: ${{values.namespace}}
  labels:
    app.kubernetes.io/name: ${{values.name}}
    backstage.io/kubernetes-id: ${{values.uniqueName}}
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: ${{values.name}}-route
  defaults:
    rules:
      authentication:
{%- if values.authModel === "apikey" %}
        api-key-auth:
          apiKey:
            allNamespaces: true
            selector:
              matchLabels:
                app: ${{values.name}}
                kuadrant.io/apikey: "true"
          credentials:
            customHeader:
              name: X-API-Key
          priority: 0
{%- endif %}
{%- if values.authModel === "oidc" %}
        oidc:
          jwt:
            issuerUrl: https://rhbk.${{values.clusterDomain}}/realms/${{values.keycloakRealm}}
          credentials:
            authorizationHeader:
              prefix: Bearer
          priority: 1
{%- endif %}
      response:
        success: {}
        unauthenticated:
          code: 401
          body:
{%- if values.authModel === "apikey" %}
            value: '{"error":"Invalid or missing API key. Include header X-API-Key with a valid key."}'
{%- else %}
            value: '{"error":"Authentication required. Provide a valid Bearer token."}'
{%- endif %}
          headers:
            content-type:
              value: "application/json"
