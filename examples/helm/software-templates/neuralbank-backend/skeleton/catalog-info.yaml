apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: ${{values.owner}}-neuralbank
  description: Neuralbank financial platform
spec:
  owner: user:${{values.owner}}
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: ${{values.uniqueName}}
  description: ${{values.description}}
  annotations:
    backstage.io/techdocs-ref: dir:.
    backstage.io/kubernetes-id: ${{values.uniqueName}}
    backstage.io/kubernetes-namespace: ${{values.namespace}}
    janus-idp.io/tekton: ${{values.uniqueName}}
    argocd/app-name: ${{values.uniqueName}}
    argocd/app-namespace: openshift-gitops
    tektonci/build-namespace: ${{values.namespace}}
    kuadrant.io/namespace: ${{values.namespace}}
    kuadrant.io/httproute: ${{values.name}}-route
    che.eclipse.org/che-server: https://devspaces.${{values.clusterDomain}}
    devspaces.io/factory: "https://devspaces.${{values.clusterDomain}}/#https://gitea-gitea.${{values.clusterDomain}}/ws-${{values.owner}}/${{values.name}}"
  links:
    - url: "https://devspaces.${{values.clusterDomain}}/#https://gitea-gitea.${{values.clusterDomain}}/ws-${{values.owner}}/${{values.name}}"
      title: Open in DevSpaces
      icon: catalog
      type: ide
  tags:
    - java
    - quarkus
    - rest-api
    - neuralbank
spec:
  type: service
  lifecycle: experimental
  owner: user:${{values.owner}}
  system: ${{values.owner}}-neuralbank
  providesApis:
    - ${{values.uniqueName}}-api
---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: ${{values.uniqueName}}-api
  description: "Neuralbank Credit Management REST API"
  annotations:
    kuadrant.io/namespace: ${{values.namespace}}
    kuadrant.io/apiproduct: ${{values.uniqueName}}-api
    kuadrant.io/httproute: ${{values.name}}-route
spec:
  type: openapi
  lifecycle: experimental
  owner: user:${{values.owner}}
  system: ${{values.owner}}-neuralbank
  definition: |
    openapi: 3.0.3
    info:
      title: Neuralbank Credit API
      version: 1.0.0
      description: |
        REST API for credit and customer management.
        Protected by Kuadrant AuthPolicy (API Key via X-API-Key header)
        and RateLimitPolicy (120 req/min).
        Generate your API Key from the Dev Portal.
      contact:
        name: Neuralbank Team
    servers:
      - url: https://${{values.name}}-${{values.namespace}}.${{values.clusterDomain}}
        description: Production Gateway
    components:
      securitySchemes:
        ApiKeyAuth:
          type: apiKey
          in: header
          name: X-API-Key
          description: API Key generated from the Kuadrant Dev Portal
      schemas:
        Customer:
          type: object
          properties:
            id:
              type: string
              example: "C001"
            name:
              type: string
              example: "Juan Pérez"
            email:
              type: string
              example: "juan@neuralbank.com"
            creditScore:
              type: integer
              example: 750
        Credit:
          type: object
          properties:
            id:
              type: string
              example: "CR001"
            customerId:
              type: string
              example: "C001"
            type:
              type: string
              enum: [personal, mortgage, auto]
              example: "personal"
            amount:
              type: number
              example: 25000
            status:
              type: string
              enum: [active, pending, closed, defaulted]
              example: "active"
        HealthCheck:
          type: object
          properties:
            status:
              type: string
              example: "UP"
            checks:
              type: array
              items:
                type: object
    security:
      - ApiKeyAuth: []
    tags:
      - name: customers
        description: Customer management
      - name: credits
        description: Credit management
      - name: health
        description: Health checks
    paths:
      /api/customers:
        get:
          tags: [customers]
          summary: List all customers
          operationId: listCustomers
          responses:
            '200':
              description: List of customers
              content:
                application/json:
                  schema:
                    type: array
                    items:
                      $ref: '#/components/schemas/Customer'
            '401':
              description: Missing or invalid API Key
      /api/credits:
        get:
          tags: [credits]
          summary: List all credits
          operationId: listCredits
          responses:
            '200':
              description: List of credits
              content:
                application/json:
                  schema:
                    type: array
                    items:
                      $ref: '#/components/schemas/Credit'
            '401':
              description: Missing or invalid API Key
      /api/credits/{id}/update:
        post:
          tags: [credits]
          summary: Update credit status
          operationId: updateCreditStatus
          parameters:
            - name: id
              in: path
              required: true
              schema:
                type: string
              example: "CR001"
          requestBody:
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    status:
                      type: string
                      enum: [active, pending, closed, defaulted]
          responses:
            '200':
              description: Credit updated
            '401':
              description: Missing or invalid API Key
            '404':
              description: Credit not found
      /q/health:
        get:
          tags: [health]
          summary: Health check endpoint
          operationId: healthCheck
          security: []
          responses:
            '200':
              description: Health status
              content:
                application/json:
                  schema:
                    $ref: '#/components/schemas/HealthCheck'
