apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: ${{values.uniqueName}}
  description: ${{values.description}}
  annotations:
    backstage.io/techdocs-ref: dir:.
    backstage.io/kubernetes-id: ${{values.uniqueName}}
    backstage.io/kubernetes-namespace: ${{values.namespace}}
    janus-idp.io/tekton: ${{values.uniqueName}}
    argocd/app-name: ${{values.uniqueName}}
    argocd/app-namespace: openshift-gitops
    tektonci/build-namespace: ${{values.namespace}}
    kuadrant.io/namespace: ${{values.namespace}}
    kuadrant.io/httproute: ${{values.name}}-route
    che.eclipse.org/che-server: https://devspaces.${{values.clusterDomain}}
    devspaces.io/factory: "https://devspaces.${{values.clusterDomain}}/#https://gitea-gitea.${{values.clusterDomain}}/ws-${{values.owner}}/${{values.name}}"
  links:
    - url: "https://devspaces.${{values.clusterDomain}}/#https://gitea-gitea.${{values.clusterDomain}}/ws-${{values.owner}}/${{values.name}}"
      title: Open in DevSpaces
      icon: catalog
      type: ide
  tags:
    - java
    - quarkus
    - mcp
    - neuralbank
spec:
  type: service
  lifecycle: experimental
  owner: user:${{values.owner}}
  system: ${{values.owner}}-neuralbank
  providesApis:
    - ${{values.uniqueName}}-api
  dependsOn:
    - component:default/${{values.owner}}-neuralbank-backend
---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: ${{values.uniqueName}}-api
  description: "MCP Server API for customer service AI agent"
  annotations:
    kuadrant.io/namespace: ${{values.namespace}}
    kuadrant.io/apiproduct: ${{values.uniqueName}}-api
    kuadrant.io/httproute: ${{values.name}}-route
spec:
  type: openapi
  lifecycle: experimental
  owner: user:${{values.owner}}
  system: ${{values.owner}}-neuralbank
  definition: |
    openapi: 3.0.3
    info:
      title: Customer Service MCP API
      version: 1.0.0
      description: |
        Model Context Protocol server for AI-powered customer service.
        Protected by Kuadrant AuthPolicy (API Key via X-API-Key header)
        and RateLimitPolicy (120 req/min).
        Generate your API Key from the Dev Portal.
      contact:
        name: Neuralbank Team
    servers:
      - url: https://${{values.name}}-${{values.namespace}}.${{values.clusterDomain}}
        description: Production Gateway
    components:
      securitySchemes:
        ApiKeyAuth:
          type: apiKey
          in: header
          name: X-API-Key
          description: API Key generated from the Kuadrant Dev Portal
      schemas:
        MCPRequest:
          type: object
          description: MCP protocol JSON-RPC request
          properties:
            jsonrpc:
              type: string
              example: "2.0"
            method:
              type: string
              description: MCP method to invoke
              example: "tools/list"
            id:
              oneOf:
                - type: string
                - type: integer
              example: 1
            params:
              type: object
              description: Method parameters
          required:
            - jsonrpc
            - method
        MCPResponse:
          type: object
          description: MCP protocol JSON-RPC response
          properties:
            jsonrpc:
              type: string
              example: "2.0"
            id:
              oneOf:
                - type: string
                - type: integer
            result:
              type: object
              description: Method result
            error:
              type: object
              properties:
                code:
                  type: integer
                message:
                  type: string
        HealthCheck:
          type: object
          properties:
            status:
              type: string
              example: "UP"
            checks:
              type: array
              items:
                type: object
    security:
      - ApiKeyAuth: []
    tags:
      - name: mcp
        description: Model Context Protocol endpoints
      - name: health
        description: Health checks
    paths:
      /mcp:
        post:
          tags: [mcp]
          summary: MCP protocol endpoint (HTTP)
          operationId: mcpPost
          description: |
            Send JSON-RPC requests to the MCP server.
            Supported methods: tools/list, tools/call, resources/list, resources/read, prompts/list, prompts/get.
          requestBody:
            required: true
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/MCPRequest'
                examples:
                  listTools:
                    summary: List available tools
                    value:
                      jsonrpc: "2.0"
                      method: "tools/list"
                      id: 1
                      params: {}
                  callTool:
                    summary: Call a tool
                    value:
                      jsonrpc: "2.0"
                      method: "tools/call"
                      id: 2
                      params:
                        name: "getCustomerInfo"
                        arguments:
                          customerId: "C001"
          responses:
            '200':
              description: MCP JSON-RPC response
              content:
                application/json:
                  schema:
                    $ref: '#/components/schemas/MCPResponse'
            '401':
              description: Missing or invalid API Key
      /mcp/sse:
        get:
          tags: [mcp]
          summary: MCP Server-Sent Events endpoint
          operationId: mcpSse
          description: |
            Connect via SSE for real-time MCP communication.
            The server sends events as the AI agent processes requests.
          responses:
            '200':
              description: SSE event stream
              content:
                text/event-stream:
                  schema:
                    type: string
            '401':
              description: Missing or invalid API Key
      /q/health:
        get:
          tags: [health]
          summary: Health check endpoint
          operationId: healthCheck
          security: []
          responses:
            '200':
              description: Health status
              content:
                application/json:
                  schema:
                    $ref: '#/components/schemas/HealthCheck'
