apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: gateforge-register-component
  title: "GateForge — Register Migrated Component"
  description: >
    Registers a Component entity in the Developer Hub catalog for an API
    migrated from 3scale to Connectivity Link by GateForge. The entity
    definition is served by the GateForge backend (no Git repository
    required). Triggered automatically by the GateForge backend after
    a successful migration apply.
  tags:
    - gateforge
    - connectivity-link
    - kuadrant
    - migration
    - catalog
spec:
  owner: platform-engineering
  type: service
  parameters:
    - title: Migration Details
      required:
        - planId
        - productName
        - componentName
        - namespace
      properties:
        planId:
          title: Migration Plan ID
          type: string
          description: "GateForge migration plan identifier"
          ui:autofocus: true
        productName:
          title: Product System Name
          type: string
          description: "3scale product system name (e.g. nfl-wallet-apikey)"
          pattern: "^[a-z0-9-]+$"
        componentName:
          title: Component Name
          type: string
          description: "Name for the catalog Component (e.g. nfl-wallet-apikey-product)"
          pattern: "^[a-z0-9-]+$"
        namespace:
          title: Target Namespace
          type: string
          description: "Kubernetes namespace where Kuadrant resources were applied"
          pattern: "^[a-z0-9-]+$"
        owner:
          title: Owner
          type: string
          description: "Entity owner reference"
          default: "group:default/3scale"
        clusterDomain:
          title: Cluster Domain
          type: string
          ui:widget: hidden
          default: "apps.cluster.example.com"

  steps:
    - id: register
      name: Register Component in Catalog
      action: catalog:register
      input:
        catalogInfoUrl: "https://gateforge-gateforge.${{ parameters.clusterDomain }}/api/migration/plans/${{ parameters.planId }}/catalog-info/${{ parameters.productName }}"

    - id: notify
      name: Send Registration Notification
      action: http:backstage:request
      continueOnError: true
      input:
        method: POST
        path: /proxy/mailpit/api/v1/send
        headers:
          Content-Type: application/json
        body:
          From:
            Email: "developer-hub@redhat.local"
            Name: "Red Hat Developer Hub"
          To:
            - Email: "platformadmin@redhat.local"
              Name: "Platform Admin"
          Subject: "GateForge — Component Registered: ${{ parameters.componentName }}"
          Text: "Component ${{ parameters.componentName }} has been registered in the Developer Hub catalog via GateForge migration plan ${{ parameters.planId }}. Namespace: ${{ parameters.namespace }}."
          HTML: "<div style='font-family:Red Hat Text,Helvetica,Arial,sans-serif;max-width:600px;margin:0 auto;border:1px solid #e0e0e0;border-radius:8px;overflow:hidden'><div style='background:#0066CC;padding:24px 32px;text-align:center'><h1 style='color:#fff;margin:0;font-size:22px'>Component Registered</h1><p style='color:#d2d2d2;margin:4px 0 0;font-size:12px'>GateForge Migration</p></div><div style='padding:32px'><h2 style='color:#151515;margin:0 0 16px;font-size:18px'>${{ parameters.componentName }}</h2><table style='width:100%;border-collapse:collapse;font-size:14px;margin-bottom:24px'><tr style='border-bottom:1px solid #f0f0f0'><td style='padding:10px 0;color:#6a6e73;width:160px'>Plan ID</td><td style='padding:10px 0;color:#151515;font-weight:500'>${{ parameters.planId }}</td></tr><tr style='border-bottom:1px solid #f0f0f0'><td style='padding:10px 0;color:#6a6e73'>Product</td><td style='padding:10px 0;color:#151515;font-weight:500'>${{ parameters.productName }}</td></tr><tr style='border-bottom:1px solid #f0f0f0'><td style='padding:10px 0;color:#6a6e73'>Namespace</td><td style='padding:10px 0;color:#151515;font-weight:500'>${{ parameters.namespace }}</td></tr><tr><td style='padding:10px 0;color:#6a6e73'>Owner</td><td style='padding:10px 0;color:#151515;font-weight:500'>${{ parameters.owner }}</td></tr></table></div><div style='background:#f0f0f0;padding:16px 32px;text-align:center;font-size:11px;color:#6a6e73'>Powered by GateForge &bull; Red Hat Developer Hub</div></div>"

  output:
    links:
      - title: Open in catalog
        icon: catalog
        entityRef: ${{ steps['register'].output.entityRef }}
    text:
      - title: Registration Complete
        content: |
          Component **${{ parameters.componentName }}** registered in the catalog:
          - Plan: `${{ parameters.planId }}`
          - Product: `${{ parameters.productName }}`
          - Namespace: `${{ parameters.namespace }}`
          - Owner: `${{ parameters.owner }}`
