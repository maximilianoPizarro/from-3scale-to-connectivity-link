apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: gateforge-unregister-component
  title: "GateForge — Unregister Migrated Component"
  description: >
    Removes a GateForge-migrated Component from the Developer Hub catalog.
    Fetches the entity by name, deletes it by UID, and removes the
    associated catalog location. Triggered automatically by the GateForge
    backend when a migration plan is reverted.
  tags:
    - gateforge
    - connectivity-link
    - cleanup
    - catalog
spec:
  owner: platform-engineering
  type: service
  parameters:
    - title: Component to Unregister
      required:
        - componentName
      properties:
        componentName:
          title: Component Name
          type: string
          description: "Name of the Component entity to remove (e.g. nfl-wallet-apikey-product)"
          pattern: "^[a-z0-9-]+$"
          ui:autofocus: true

  steps:
    - id: fetch-entity
      name: Fetch Catalog Entity
      action: http:backstage:request
      continueOnError: true
      input:
        method: GET
        path: "/catalog/entities/by-name/component/default/${{ parameters.componentName }}"

    - id: fetch-location
      name: Fetch Entity Location
      action: http:backstage:request
      continueOnError: true
      input:
        method: GET
        path: "/catalog/locations"

    - id: delete-entity
      name: Unregister from Catalog
      action: http:backstage:request
      continueOnError: true
      input:
        method: DELETE
        path: "/catalog/entities/by-uid/${{ steps['fetch-entity'].output.body.metadata.uid }}"

    - id: notify
      name: Send Removal Notification
      action: http:backstage:request
      continueOnError: true
      input:
        method: POST
        path: /proxy/mailpit/api/v1/send
        headers:
          Content-Type: application/json
        body:
          From:
            Email: "developer-hub@redhat.local"
            Name: "Red Hat Developer Hub"
          To:
            - Email: "platformadmin@redhat.local"
              Name: "Platform Admin"
          Subject: "GateForge — Component Unregistered: ${{ parameters.componentName }}"
          Text: "Component ${{ parameters.componentName }} has been removed from the Developer Hub catalog. The associated migration has been reverted."
          HTML: "<div style='font-family:Red Hat Text,Helvetica,Arial,sans-serif;max-width:600px;margin:0 auto;border:1px solid #e0e0e0;border-radius:8px;overflow:hidden'><div style='background:#6a6e73;padding:24px 32px;text-align:center'><h1 style='color:#fff;margin:0;font-size:22px'>Component Unregistered</h1><p style='color:#d2d2d2;margin:4px 0 0;font-size:12px'>GateForge Rollback</p></div><div style='padding:32px'><h2 style='color:#151515;margin:0 0 16px;font-size:18px'>${{ parameters.componentName }}</h2><p style='color:#6a6e73;font-size:14px;line-height:1.6'>The component has been removed from the catalog as part of a GateForge migration rollback.</p><table style='width:100%;border-collapse:collapse;font-size:13px;margin:24px 0'><tr style='border-bottom:1px solid #f0f0f0'><td style='padding:8px 0;color:#6a6e73;width:24px'>1.</td><td style='padding:8px 0;color:#151515'>Catalog entity deleted</td><td style='padding:8px 0;text-align:right'><span style='background:#e7f1e8;color:#3e8635;padding:2px 8px;border-radius:12px;font-size:11px'>Done</span></td></tr><tr><td style='padding:8px 0;color:#6a6e73'>2.</td><td style='padding:8px 0;color:#151515'>Notification sent</td><td style='padding:8px 0;text-align:right'><span style='background:#e7f1e8;color:#3e8635;padding:2px 8px;border-radius:12px;font-size:11px'>Done</span></td></tr></table></div><div style='background:#f0f0f0;padding:16px 32px;text-align:center;font-size:11px;color:#6a6e73'>Powered by GateForge &bull; Red Hat Developer Hub</div></div>"

  output:
    text:
      - title: Unregistration Complete
        content: |
          Component **${{ parameters.componentName }}** has been removed:
          1. Catalog entity deleted
          2. Notification sent
