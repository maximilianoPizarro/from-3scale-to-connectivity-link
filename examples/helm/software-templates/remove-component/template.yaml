apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: remove-component
  title: "Remove Component (Cleanup)"
  description: >
    Removes a previously created component from the platform:
    deletes the Gitea repository (ApplicationSet auto-prunes the ArgoCD Application),
    and cleans up ClusterRoleBindings.
    Catalog entities are automatically orphaned and removed.
  tags:
    - cleanup
    - admin
    - remove
spec:
  owner: platform-engineering
  type: service
  parameters:
    - title: Component to Remove
      required:
        - name
        - owner
      properties:
        name:
          title: Component Name
          type: string
          description: "Base name of the component (e.g. neuralbank-backend)"
          pattern: "^[a-z0-9-]+$"
          ui:autofocus: true
          enum:
            - neuralbank-backend
            - neuralbank-frontend
            - customer-service-mcp
        owner:
          title: Owner (username)
          type: string
          description: "Owner of the component (e.g. user1)"
          pattern: "^user[0-9]+$"
        clusterDomain:
          title: Cluster Domain
          type: string
          default: "apps.cluster-l9nhj.dynamic.redhatworkshops.io"
          ui:widget: hidden
  steps:
    - id: delete-gitea-repo
      name: Delete Gitea Repository
      action: http:backstage:request
      input:
        method: DELETE
        path: "/api/proxy/gitea/repos/ws-${{ parameters.owner }}/${{ parameters.name }}"
        headers:
          Content-Type: application/json

    - id: delete-clusterrolebinding-trigger
      name: Delete Trigger ClusterRoleBinding
      action: http:backstage:request
      input:
        method: DELETE
        path: "/api/proxy/k8s-api/apis/rbac.authorization.k8s.io/v1/clusterrolebindings/${{ parameters.owner }}-${{ parameters.name }}-trigger-clusterbinding"
        headers:
          Content-Type: application/json

    - id: delete-clusterrolebinding-scc
      name: Delete Pipeline SCC ClusterRoleBinding
      action: http:backstage:request
      input:
        method: DELETE
        path: "/api/proxy/k8s-api/apis/rbac.authorization.k8s.io/v1/clusterrolebindings/${{ parameters.owner }}-neuralbank-pipeline-scc-privileged"
        headers:
          Content-Type: application/json

    - id: delete-namespace
      name: Delete User Namespace
      action: http:backstage:request
      input:
        method: DELETE
        path: "/api/proxy/k8s-api/api/v1/namespaces/${{ parameters.owner }}-neuralbank"
        headers:
          Content-Type: application/json

    - id: unregister-catalog
      name: Unregister from Catalog
      action: catalog:unregister
      input:
        entityRef: "component:default/${{ parameters.owner }}-${{ parameters.name }}"

    - id: notify
      name: Send Cleanup Notification
      action: http:backstage:request
      input:
        method: POST
        path: /api/notifications
        headers:
          Content-Type: application/json
        body:
          recipients:
            type: entity
            entityRef: "user:default/${{ parameters.owner }}"
          payload:
            title: "Component removed from platform"
            description: "Component **${{ parameters.owner }}-${{ parameters.name }}** has been removed. Deleted: Gitea repository (ws-${{ parameters.owner }}/${{ parameters.name }}), ClusterRoleBindings, namespace `${{ parameters.owner }}-neuralbank`, and catalog entity. ArgoCD Application will be auto-pruned by ApplicationSet."
            severity: high
            topic: cleanup

  output:
    text:
      - title: Cleanup Complete
        content: |
          Component **${{ parameters.owner }}-${{ parameters.name }}** owned by **${{ parameters.owner }}** has been removed from:
          - Gitea (repository `ws-${{ parameters.owner }}/${{ parameters.name }}`)
          - ArgoCD (Application auto-pruned by ApplicationSet)
          - ClusterRoleBindings (trigger, pipeline SCC)
          - OpenShift (namespace `${{ parameters.owner }}-neuralbank`)
          - Backstage Catalog (entity unregistered)
