apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: api-gateway-golden-path
  title: "API Gateway (Golden Path)"
  description: "Deploy a secured API Gateway with Istio Gateway, HTTPRoute, and Kuadrant AuthPolicy. Requires elevated permissions. Secured by API key."
  tags:
    - gateway
    - kuadrant
    - api
    - golden-path
    - elevated
spec:
  owner: platform-engineering
  type: api
  parameters:
    - title: Gateway Configuration
      required:
        - name
        - owner
        - backendService
        - backendNamespace
        - backendPort
      properties:
        name:
          title: Gateway Name
          type: string
          description: Unique name for the API Gateway
          pattern: "^[a-z0-9-]+$"
          ui:autofocus: true
        description:
          title: Description
          type: string
          description: What API does this gateway expose?
          default: "API Gateway with Kuadrant security policies"
        owner:
          title: Owner
          type: string
          description: Your username (e.g. user1)
          pattern: "^user[0-9]+$"
        backendService:
          title: Backend Service Name
          type: string
          description: Name of the Kubernetes Service to expose
        backendNamespace:
          title: Backend Namespace
          type: string
          description: Namespace of the backend service
        backendPort:
          title: Backend Port
          type: integer
          description: Port number of the backend service
          default: 8080
    - title: Security Configuration
      properties:
        rateLimit:
          title: Rate Limit (requests/minute)
          type: integer
          default: 60
          description: Maximum requests per minute per API key
  steps:
    - id: fetch-skeleton
      name: Fetch Skeleton
      action: fetch:template
      input:
        url: ./skeleton
        values:
          name: ${{ parameters.name }}
          owner: ${{ parameters.owner }}
          description: ${{ parameters.description }}
          namespace: "${{ parameters.owner }}-devspaces"
          backendService: ${{ parameters.backendService }}
          backendNamespace: ${{ parameters.backendNamespace }}
          backendPort: ${{ parameters.backendPort }}
          rateLimit: ${{ parameters.rateLimit }}
    - id: publish
      name: Publish to Gitea
      action: publish:gitea
      input:
        repoUrl: "gitea.gitea.svc.cluster.local:3000?owner=developer-hub&repo=${{ parameters.name }}"
        description: ${{ parameters.description }}
        defaultBranch: main
        repoVisibility: public
    - id: create-argocd-app
      name: Create ArgoCD Application
      action: argocd:create-resources
      input:
        appName: ${{ parameters.name }}
        argoInstance: openshift-gitops
        namespace: "${{ parameters.owner }}-devspaces"
        repoUrl: "http://gitea.gitea.svc.cluster.local:3000/developer-hub/${{ parameters.name }}.git"
        path: manifests
    - id: register
      name: Register in Catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['publish'].output.repoContentsUrl }}
        catalogInfoPath: /catalog-info.yaml
  output:
    links:
      - title: Repository
        url: ${{ steps['publish'].output.remoteUrl }}
      - title: Open in Catalog
        icon: catalog
        entityRef: ${{ steps['register'].output.entityRef }}
