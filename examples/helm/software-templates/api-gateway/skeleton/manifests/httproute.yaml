apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ${{values.name}}-route
  namespace: ${{values.namespace}}
  labels:
    app.kubernetes.io/name: ${{values.name}}
    backstage.io/kubernetes-id: ${{values.name}}
spec:
  parentRefs:
    - name: ${{values.name}}-gateway
      namespace: ${{values.namespace}}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: ${{values.backendService}}
          namespace: ${{values.backendNamespace}}
          port: ${{values.backendPort}}
          weight: 1
